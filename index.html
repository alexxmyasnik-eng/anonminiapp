<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AnonPeak</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg:#08080f;--s1:#0f0f1a;--s2:#161625;--s3:#1e1e30;
  --br:#252538;--br2:#2f2f48;
  --ac:#7b5cf0;--ac2:#a78bfa;--ac3:#c4b5fd;
  --gr:#10b981;--gr2:#34d399;
  --rd:#f43f5e;--yl:#f59e0b;
  --tx:#f1f0ff;--tx2:#a9a8c9;--tx3:#6b6a8a;
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;padding-bottom:env(safe-area-inset-bottom)}

/* HEADER */
.hdr{position:sticky;top:0;z-index:50;background:rgba(8,8,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:10px 16px;gap:10px}
.hdr-logo{font-family:'Unbounded',sans-serif;font-weight:800;font-size:17px;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-bal{margin-left:auto;background:var(--s3);border:1px solid var(--br);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--gr2)}
.hdr-ico{background:none;border:none;color:var(--tx3);cursor:pointer;padding:4px;display:flex;align-items:center}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(8,8,15,.95);backdrop-filter:blur(20px);border-top:1px solid var(--br);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;background:none;border:none;color:var(--tx3);font-family:'Manrope',sans-serif;font-size:10px;cursor:pointer;transition:color .2s;position:relative}
.nb.on{color:var(--ac2)}
.nb svg{width:20px;height:20px}
.nb-dot{position:absolute;top:6px;right:50%;transform:translateX(10px);width:6px;height:6px;background:var(--rd);border-radius:50%;display:none}
.nb-dot.show{display:block}

/* PAGES */
.pg{display:none;padding:16px 16px 76px;animation:fu .2s ease}
.pg.on{display:block}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* SECTION TITLE */
.st{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--tx3);margin:20px 0 10px}

/* CARDS */
.cats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat{background:var(--s2);border:1px solid var(--br);border-radius:var(--r16);padding:20px 16px;cursor:pointer;transition:all .15s;text-align:center}
.cat:active{transform:scale(.96);background:var(--s3)}
.cat-i{font-size:30px;margin-bottom:8px}
.cat-n{font-size:13px;font-weight:600;color:var(--tx)}

.prods{display:flex;flex-direction:column;gap:8px}
.prod{background:var(--s2);border:1px solid var(--br);border-radius:var(--r16);padding:14px;cursor:pointer;display:flex;gap:12px;transition:all .12s}
.prod:active{transform:scale(.98)}
.prod-thumb{width:54px;height:54px;border-radius:var(--r12);background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.prod-thumb img{width:100%;height:100%;object-fit:cover}
.prod-info{flex:1;min-width:0}
.prod-t{font-weight:700;font-size:14px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-s{font-size:11px;color:var(--tx3);margin-bottom:4px}
.prod-p{font-weight:700;font-size:15px;color:var(--gr2)}

/* DETAIL */
.det-media{width:100%;aspect-ratio:1;border-radius:var(--r20);background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:64px;overflow:hidden;margin-bottom:16px}
.det-media img,.det-media video{width:100%;height:100%;object-fit:cover}
.det-t{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px}
.det-s{color:var(--tx3);font-size:13px;margin-bottom:8px}
.det-d{color:var(--tx2);font-size:14px;line-height:1.6;margin-bottom:16px}
.det-p{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:800;color:var(--gr2);margin-bottom:20px}

/* BUTTONS */
.btn{width:100%;padding:15px;border-radius:var(--r16);border:none;font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .12s;margin-bottom:10px}
.btn:active{transform:scale(.97)}
.btn-pr{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff}
.btn-gr{background:var(--gr);color:#fff}
.btn-ol{background:transparent;border:1.5px solid var(--br2);color:var(--tx)}
.btn-rd{background:var(--rd);color:#fff}
.btn-sm{width:auto;padding:8px 16px;font-size:13px;margin-bottom:0}
.back{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--ac2);font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;cursor:pointer;padding:0 0 14px}

/* PROFILE */
.ava{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px;overflow:hidden}
.ava img{width:100%;height:100%;object-fit:cover}
.p-name{text-align:center;font-family:'Unbounded',sans-serif;font-size:20px;font-weight:700}
.p-age{text-align:center;color:var(--tx3);font-size:13px;margin:4px 0 20px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat{background:var(--s2);border:1px solid var(--br);border-radius:var(--r16);padding:14px;text-align:center}
.stat-v{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:700;color:var(--ac2)}
.stat-l{font-size:11px;color:var(--tx3);margin-top:3px}

/* WALLET */
.w-card{background:linear-gradient(135deg,#140e2a,#0a1525);border:1px solid #2a1f50;border-radius:var(--r20);padding:24px;text-align:center;margin-bottom:20px;position:relative;overflow:hidden}
.w-card::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:var(--ac);opacity:.06;border-radius:50%}
.w-label{font-size:11px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.w-amt{font-family:'Unbounded',sans-serif;font-size:38px;font-weight:800;color:var(--gr2)}
.amts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.amt-btn{background:var(--s2);border:1.5px solid var(--br);border-radius:var(--r12);padding:12px 4px;font-size:13px;font-weight:700;color:var(--tx);cursor:pointer;transition:all .12s;font-family:'Manrope',sans-serif}
.amt-btn.sel{border-color:var(--ac);color:var(--ac2);background:rgba(123,92,240,.1)}
.amt-btn:active{transform:scale(.95)}
.instr{background:var(--s2);border:1px solid var(--br);border-radius:var(--r16);padding:16px;margin-top:10px}
.instr-comment{background:var(--s1);border:1px solid var(--br);border-radius:var(--r8);padding:10px 14px;font-size:14px;color:var(--gr2);font-weight:700;text-align:center;cursor:pointer;margin:8px 0;letter-spacing:.5px}

/* ORDERS */
.ord{background:var(--s2);border:1px solid var(--br);border-radius:var(--r16);padding:14px;margin-bottom:8px;cursor:pointer;transition:all .12s}
.ord:active{transform:scale(.98)}
.ord-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ord-id{font-family:'Unbounded',sans-serif;font-size:11px;color:var(--ac2)}
.badge{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:600}
.b-paid{background:rgba(16,185,129,.15);color:var(--gr2)}
.b-done{background:rgba(123,92,240,.15);color:var(--ac2)}
.b-pend{background:rgba(244,63,94,.15);color:var(--rd)}
.b-canc{background:rgba(107,106,138,.15);color:var(--tx3)}
.ord-t{font-size:14px;font-weight:600;margin-bottom:3px}
.ord-m{font-size:12px;color:var(--tx3)}

/* CHAT */
.chat-hdr{background:var(--s2);border-bottom:1px solid var(--br);padding:12px 16px;margin:-16px -16px 0;position:sticky;top:57px;z-index:10}
.chat-t{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:600}
.chat-s{font-size:11px;color:var(--tx3);margin-top:2px}
.msgs{display:flex;flex-direction:column;gap:6px;padding:12px 0 80px}
.msg{max-width:80%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5}
.msg-o{background:linear-gradient(135deg,var(--ac),#5a3fd4);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg-i{background:var(--s3);color:var(--tx);align-self:flex-start;border-bottom-left-radius:4px}
.msg-t{font-size:10px;opacity:.6;margin-top:3px;text-align:right}
.cinput-wrap{position:fixed;bottom:0;left:0;right:0;padding:10px 16px calc(10px + env(safe-area-inset-bottom));background:rgba(8,8,15,.97);backdrop-filter:blur(20px);border-top:1px solid var(--br);display:flex;gap:8px;z-index:50}
.cinput{flex:1;background:var(--s3);border:1.5px solid var(--br);border-radius:24px;padding:10px 16px;color:var(--tx);font-family:'Manrope',sans-serif;font-size:14px;outline:none}
.cinput:focus{border-color:var(--ac)}
.csend{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.csend:active{transform:scale(.9)}

/* SELL FORM */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--tx3);font-weight:600;margin-bottom:6px;letter-spacing:.3px}
.field input,.field textarea,.field select{width:100%;background:var(--s2);border:1.5px solid var(--br);border-radius:var(--r12);padding:12px 14px;color:var(--tx);font-family:'Manrope',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--ac)}
.field textarea{resize:none;height:80px}
.field select option{background:var(--s2)}

/* TOAST */
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--s3);border:1px solid var(--br);border-radius:var(--r12);padding:10px 18px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;max-width:80vw;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* MISC */
.loader{text-align:center;padding:50px;color:var(--tx3)}
.spin{width:30px;height:30px;border-radius:50%;border:2.5px solid var(--br2);border-top-color:var(--ac);animation:sp .7s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px 20px;color:var(--tx3)}
.empty-i{font-size:40px;margin-bottom:10px}
.hr{height:1px;background:var(--br);margin:16px 0}
.row{display:flex;gap:8px}
.row .btn{flex:1;margin-bottom:0}
.chip-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:12px}
.chip-row::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:var(--s2);border:1.5px solid var(--br);color:var(--tx3);transition:all .15s;font-family:'Manrope',sans-serif}
.chip.on{border-color:var(--ac);color:var(--ac2);background:rgba(123,92,240,.1)}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-logo">ANONPEAK</div>
  <button class="hdr-ico" onclick="doSearch()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  </button>
  <button class="hdr-ico" onclick="goSupport()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="currentColor"/></svg>
  </button>
  <div class="hdr-bal" id="hBal">0 ₽</div>
</div>

<div class="toast" id="toast"></div>

<!-- PAGES -->
<div class="pg on" id="pg-market"><div class="loader"><div class="spin"></div></div></div>
<div class="pg" id="pg-sell"></div>
<div class="pg" id="pg-orders"></div>
<div class="pg" id="pg-wallet"></div>
<div class="pg" id="pg-profile"></div>
<div class="pg" id="pg-product"></div>
<div class="pg" id="pg-chat"></div>
<div class="pg" id="pg-editprofile"></div>

<!-- NAV -->
<nav class="nav">
  <button class="nb on" id="nb-market" onclick="goPage('market')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Маркет
  </button>
  <button class="nb" id="nb-sell" onclick="goPage('sell')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Продать
  </button>
  <button class="nb" id="nb-orders" onclick="goPage('orders')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    Заказы
    <span class="nb-dot" id="dot-orders"></span>
  </button>
  <button class="nb" id="nb-wallet" onclick="goPage('wallet')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
    Кошелёк
  </button>
  <button class="nb" id="nb-profile" onclick="goPage('profile')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Профиль
  </button>
</nav>

<script>
// ── CONFIG ────────────────────────────────────────────────
const API = 'https://anonpeak-production.up.railway.app';
const tg  = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.enableClosingConfirmation(); }

// ── STATE ─────────────────────────────────────────────────
const S = { page:'market', user:null, cat:null, chatInterval:null };

// ── HELPERS ───────────────────────────────────────────────
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
const uid = () => tg?.initDataUnsafe?.user?.id || null;
const nick = () => tg?.initDataUnsafe?.user?.first_name || 'Гость';

function toast(msg, ms=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), ms);
}

function loader(id) {
  document.getElementById(id).innerHTML = '<div class="loader"><div class="spin"></div></div>';
}

function empty(id, icon, text) {
  document.getElementById(id).innerHTML = `<div class="empty"><div class="empty-i">${icon}</div>${text}</div>`;
}

// ── API ───────────────────────────────────────────────────
async function api(path, method='GET', body=null) {
  const h = {'Content-Type':'application/json'};
  const u = uid();
  if (u) h['x-tg-user-id'] = String(u);
  const opts = {method, headers:h};
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API+path, opts);
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.detail||r.status); }
  return r.json();
}

// ── NAVIGATION ────────────────────────────────────────────
function goPage(name) {
  if (S.chatInterval) { clearInterval(S.chatInterval); S.chatInterval = null; }
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
  document.getElementById('pg-'+name).classList.add('on');
  const nb = document.getElementById('nb-'+name);
  if (nb) nb.classList.add('on');
  S.page = name;
  const renders = {market:renderMarket, sell:renderSell, orders:renderOrders, wallet:renderWallet, profile:renderProfile};
  if (renders[name]) renders[name]();
}

function showPage(name) {
  if (S.chatInterval) { clearInterval(S.chatInterval); S.chatInterval = null; }
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  document.getElementById('pg-'+name).classList.add('on');
  S.page = name;
}

// ── MARKET ────────────────────────────────────────────────
function renderMarket() {
  if (S.cat) { renderProducts(S.cat); return; }
  const cats = [
    {id:'signa', name:'Сигна', icon:'🖊'},
    {id:'mugs',  name:'Кружки',icon:'☕'},
    {id:'photos',name:'Фото',  icon:'📸'},
    {id:'videos',name:'Видео', icon:'🎬'},
  ];
  document.getElementById('pg-market').innerHTML = `
    <div class="st">Категории</div>
    <div class="cats">
      ${cats.map(c=>`<div class="cat" onclick="openCat('${c.id}')">
        <div class="cat-i">${c.icon}</div>
        <div class="cat-n">${c.name}</div>
      </div>`).join('')}
    </div>`;
}

async function openCat(catId) {
  S.cat = catId;
  await renderProducts(catId);
}

async function renderProducts(catId) {
  const el = document.getElementById('pg-market');
  const catNames = {signa:'🖊 Сигна', mugs:'☕ Кружки', photos:'📸 Фото', videos:'🎬 Видео'};
  el.innerHTML = `<button class="back" onclick="S.cat=null;renderMarket()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    ${catNames[catId]||catId}
  </button><div class="loader"><div class="spin"></div></div>`;
  try {
    const prods = await api(`/products/${catId}`);
    const list = el.querySelector('.loader').parentNode;
    if (!prods.length) {
      el.querySelector('.loader').outerHTML = '<div class="empty"><div class="empty-i">📭</div>Товаров пока нет</div>';
      return;
    }
    el.querySelector('.loader').outerHTML = `<div class="prods">${prods.map(p=>`
      <div class="prod" onclick="openProduct(${p.id})">
        <div class="prod-thumb">📦</div>
        <div class="prod-info">
          <div class="prod-t">${esc(p.title)}</div>
          <div class="prod-s">@${esc(p.seller_nick)} · ⭐${p.seller_rating.toFixed(1)}</div>
          <div class="prod-p">${p.price} ₽</div>
        </div>
      </div>`).join('')}</div>`;
  } catch(e) { el.querySelector('.loader').outerHTML = `<div class="empty"><div class="empty-i">⚠️</div>${e.message}</div>`; }
}

async function openProduct(id) {
  loader('pg-product');
  showPage('product');
  try {
    const p = await api(`/product/${id}`);
    const myId = uid();
    const isMine = myId && p.seller_id === myId;
    document.getElementById('pg-product').innerHTML = `
      <button class="back" onclick="showPage('market')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>Назад
      </button>
      <div class="det-media">📦</div>
      <div class="det-t">${esc(p.title)}</div>
      <div class="det-s">👤 ${esc(p.seller_nick)} · ⭐ ${p.seller_rating.toFixed(1)} (${p.seller_reviews} отзывов)</div>
      <div class="det-d">${esc(p.description||'')}</div>
      <div class="det-p">${p.price} ₽</div>
      ${isMine
        ? `<div class="btn btn-ol" style="text-align:center;cursor:default">Это ваш товар</div>`
        : `<button class="btn btn-pr" onclick="doBuy(${p.id},${p.price})">🛒 Купить — ${p.price} ₽</button>`
      }`;
  } catch(e) { document.getElementById('pg-product').innerHTML = `<div class="empty"><div class="empty-i">⚠️</div>${e.message}</div>`; }
}

async function doBuy(id, price) {
  const myId = uid();
  if (!myId) { toast('⚠️ Нужен Telegram'); return; }
  const bal = S.user?.balance ?? 0;
  if (bal < price) {
    toast('❌ Недостаточно средств');
    setTimeout(() => goPage('wallet'), 800);
    return;
  }
  try {
    const r = await api('/buy','POST',{product_id:id});
    if (r.ok) {
      toast(`✅ Куплено! Заказ ${r.short_id}`);
      if (S.user) S.user.balance -= price;
      document.getElementById('hBal').textContent = (S.user?.balance??0).toFixed(0)+' ₽';
      setTimeout(() => goPage('orders'), 1000);
    } else if (r.reason==='insufficient') {
      toast('❌ Недостаточно средств');
      setTimeout(() => goPage('wallet'), 800);
    }
  } catch(e) { toast('❌ '+e.message); }
}

// ── SELL ──────────────────────────────────────────────────
function renderSell() {
  const myId = uid();
  if (!myId) { empty('pg-sell','🔐','Открой через Telegram бота'); return; }
  document.getElementById('pg-sell').innerHTML = `
    <div class="st">Новый товар</div>
    <div class="field"><label>НАЗВАНИЕ</label><input id="s-title" placeholder="Что продаёшь?" maxlength="100"></div>
    <div class="field"><label>ОПИСАНИЕ</label><textarea id="s-desc" placeholder="Подробнее о товаре..."></textarea></div>
    <div class="field"><label>ЦЕНА (₽)</label><input id="s-price" type="number" placeholder="Минимум 15 ₽" min="15"></div>
    <div class="field"><label>КАТЕГОРИЯ</label>
      <select id="s-cat">
        <option value="">Выбери категорию</option>
        <option value="signa">🖊 Сигна</option>
        <option value="mugs">☕ Кружки</option>
        <option value="photos">📸 Фото</option>
        <option value="videos">🎬 Видео</option>
      </select>
    </div>
    <button class="btn btn-pr" onclick="doSell()">📦 Опубликовать товар</button>
    <div style="font-size:12px;color:var(--tx3);text-align:center;margin-top:8px">Комиссия платформы: 5%</div>`;
}

async function doSell() {
  const title = document.getElementById('s-title')?.value?.trim();
  const desc  = document.getElementById('s-desc')?.value?.trim();
  const price = parseFloat(document.getElementById('s-price')?.value);
  const cat   = document.getElementById('s-cat')?.value;
  if (!title) { toast('⚠️ Введи название'); return; }
  if (!price || price < 15) { toast('⚠️ Минимальная цена 15 ₽'); return; }
  if (!cat) { toast('⚠️ Выбери категорию'); return; }
  try {
    const r = await api('/products/create','POST',{title, description:desc||'', price, category:cat});
    if (r.ok) {
      toast('✅ Товар опубликован!');
      document.getElementById('s-title').value = '';
      document.getElementById('s-desc').value = '';
      document.getElementById('s-price').value = '';
      document.getElementById('s-cat').value = '';
    }
  } catch(e) { toast('❌ '+e.message); }
}

// ── ORDERS ────────────────────────────────────────────────
async function renderOrders() {
  const myId = uid();
  if (!myId) { empty('pg-orders','🔐','Открой через Telegram бота'); return; }
  loader('pg-orders');
  try {
    const orders = await api('/orders');
    const sl = {paid:'Оплачен',done:'Завершён',pending_payment:'Ожидает оплаты',seller_confirmed:'Выдан',cancelled:'Отменён'};
    const bc = {paid:'b-paid',done:'b-done',pending_payment:'b-pend',seller_confirmed:'b-paid',cancelled:'b-canc'};
    document.getElementById('pg-orders').innerHTML = orders.length
      ? `<div class="st">Мои заказы</div>`+orders.map(o=>`
          <div class="ord" onclick="openChat(${o.id})">
            <div class="ord-head">
              <div class="ord-id">${esc(o.short_id)}</div>
              <div class="badge ${bc[o.status]||'b-canc'}">${sl[o.status]||o.status}</div>
            </div>
            <div class="ord-t">${esc(o.product_title)}</div>
            <div class="ord-m">${o.role==='buyer'?'🛒 Покупатель':'🏪 Продавец'} · ${esc(o.partner_nick)} · ${o.amount} ₽</div>
          </div>`).join('')
      : '<div class="empty"><div class="empty-i">📋</div>Заказов пока нет</div>';
  } catch(e) { empty('pg-orders','⚠️',e.message); }
}

// ── CHAT ──────────────────────────────────────────────────
async function openChat(orderId) {
  loader('pg-chat');
  showPage('chat');
  try {
    const orders = await api('/orders');
    const order = orders.find(o => o.id===orderId);
    if (!order) throw new Error('Заказ не найден');
    await renderChat(order);
    if (S.chatInterval) clearInterval(S.chatInterval);
    S.chatInterval = setInterval(() => refreshChat(orderId, order), 4000);
  } catch(e) { empty('pg-chat','⚠️',e.message); }
}

async function renderChat(order) {
  const msgs = await api(`/orders/${order.id}/messages`);
  const myId = uid();
  const sl = {paid:'Оплачен',done:'Завершён',pending_payment:'Ожидает',seller_confirmed:'Выдан'};
  const canConfirm = order.role==='buyer' && ['paid','seller_confirmed'].includes(order.status);

  document.getElementById('pg-chat').innerHTML = `
    <div class="chat-hdr">
      <button class="back" onclick="clearInterval(S.chatInterval);S.chatInterval=null;goPage('orders')" style="padding-bottom:8px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>К заказам
      </button>
      <div class="chat-t">${esc(order.product_title)} <span style="color:var(--ac2);font-size:10px">${esc(order.short_id)}</span></div>
      <div class="chat-s">${order.role==='buyer'?'🛒 Вы покупатель':'🏪 Вы продавец'} · ${esc(order.partner_nick)} · ${sl[order.status]||order.status}</div>
    </div>
    <div class="msgs" id="cmsgs">
      ${msgs.length ? msgs.map(m=>`
        <div class="msg ${m.sender_id===myId?'msg-o':'msg-i'}">
          ${m.text ? esc(m.text) : '📎 Медиафайл'}
          <div class="msg-t">${(m.created_at||'').slice(11,16)}</div>
        </div>`).join('') : '<div style="text-align:center;color:var(--tx3);font-size:13px;padding:20px">Начни переписку 👋</div>'}
    </div>
    ${canConfirm?`<div style="padding:0 0 10px"><button class="btn btn-gr" onclick="doConfirm(${order.id})">✅ Получил — закрыть заказ</button></div>`:''}
    ${order.status!=='done'?`
    <div class="cinput-wrap">
      <input class="cinput" id="cinput" placeholder="Сообщение..." onkeydown="if(event.key==='Enter')doSendMsg(${order.id})">
      <button class="csend" onclick="doSendMsg(${order.id})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>`:''}`;
  scrollChat();
}

async function refreshChat(orderId, order) {
  try {
    const msgs = await api(`/orders/${orderId}/messages`);
    const myId = uid();
    const el = document.getElementById('cmsgs');
    if (!el) return;
    const atBottom = el.scrollHeight - el.scrollTop - el.offsetHeight < 60;
    el.innerHTML = msgs.length ? msgs.map(m=>`
      <div class="msg ${m.sender_id===myId?'msg-o':'msg-i'}">
        ${m.text ? esc(m.text) : '📎 Медиафайл'}
        <div class="msg-t">${(m.created_at||'').slice(11,16)}</div>
      </div>`).join('')
      : '<div style="text-align:center;color:var(--tx3);font-size:13px;padding:20px">Начни переписку 👋</div>';
    if (atBottom) scrollChat();
  } catch(e) {}
}

async function doSendMsg(orderId) {
  const inp = document.getElementById('cinput');
  const text = inp?.value?.trim();
  if (!text) return;
  inp.value = '';
  try {
    await api(`/orders/${orderId}/messages`,'POST',{text});
    const orders = await api('/orders');
    const order = orders.find(o=>o.id===orderId);
    if (order) await refreshChat(orderId, order);
    scrollChat();
  } catch(e) { toast('❌ '+e.message); }
}

async function doConfirm(orderId) {
  try {
    await api('/confirm_order','POST',{order_id:orderId});
    toast('✅ Заказ завершён!');
    clearInterval(S.chatInterval); S.chatInterval = null;
    goPage('orders');
  } catch(e) { toast('❌ '+e.message); }
}

function scrollChat() {
  const el = document.getElementById('cmsgs');
  if (el) el.scrollTop = el.scrollHeight;
}

// ── WALLET ────────────────────────────────────────────────
function renderWallet() {
  const bal = S.user?.balance ?? 0;
  document.getElementById('pg-wallet').innerHTML = `
    <div class="w-card">
      <div class="w-label">Баланс</div>
      <div class="w-amt">${bal.toFixed(0)} ₽</div>
    </div>
    <div class="st">Пополнить</div>
    <div class="amts">
      ${[100,250,500,1000,2500,5000].map(a=>`<button class="amt-btn" data-a="${a}" onclick="selAmt(${a})">${a} ₽</button>`).join('')}
    </div>
    <button class="btn btn-ol" onclick="customAmt()" style="margin-bottom:10px">✏️ Своя сумма</button>
    <div id="topup-instr"></div>
    <div class="hr"></div>
    <div class="st">Вывод</div>
    <button class="btn btn-ol" onclick="doWithdraw()">💸 Вывести средства</button>`;
}

function selAmt(a) {
  document.querySelectorAll('.amt-btn').forEach(b=>b.classList.toggle('sel',parseInt(b.dataset.a)===a));
  showTopup(a);
}

function customAmt() {
  const a = parseInt(prompt('Введи сумму (минимум 10 ₽):'));
  if (a && a >= 10) showTopup(a);
}

async function showTopup(amount) {
  const myId = uid();
  const el = document.getElementById('topup-instr');
  if (!el) return;

  const da_comment = myId ? `Топап ${myId} ${amount}` : `Топап guest ${amount}`;

  // Сохраняем в БД
  if (myId) {
    try { await api(`/topup/init/${amount}`); } catch(e) {}
  }

  el.innerHTML = `
    <div class="instr">
      <div style="font-size:13px;color:var(--tx3);margin-bottom:10px;font-weight:600">Инструкция по пополнению</div>
      <div style="font-size:13px;line-height:2;color:var(--tx2)">
        1️⃣ Перейди на DonationAlerts:<br>
        <a href="https://www.donationalerts.com/r/anonpeak" target="_blank" style="color:var(--ac2);font-weight:700">donationalerts.com/r/anonpeak</a>
      </div>
      <div style="font-size:13px;color:var(--tx2);margin:10px 0 4px">2️⃣ В поле «Сообщение» скопируй:</div>
      <div class="instr-comment" onclick="copyIt('${da_comment}')">${da_comment} 📋</div>
      <div style="font-size:13px;color:var(--tx2)">3️⃣ Сумма доната: <b style="color:var(--gr2)">${amount} ₽</b></div>
      <div style="font-size:12px;color:var(--gr2);margin-top:10px;font-weight:600">✅ Бот зачислит автоматически за 15 сек</div>
    </div>`;
}

function copyIt(text) {
  navigator.clipboard?.writeText(text).then(()=>toast('✅ Скопировано!')).catch(()=>{
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('✅ Скопировано!');
  });
}

function doWithdraw() {
  const bal = S.user?.balance ?? 0;
  if (bal < 100) { toast(`❌ Минимум 100 ₽ (у тебя ${bal.toFixed(0)} ₽)`); return; }
  toast('💸 Для вывода напиши в поддержку');
}

// ── PROFILE ───────────────────────────────────────────────
async function renderProfile() {
  const myId = uid();
  if (!myId) { empty('pg-profile','🔐','Открой через Telegram бота'); return; }
  loader('pg-profile');
  try {
    S.user = await api('/me');
    document.getElementById('hBal').textContent = S.user.balance.toFixed(0)+' ₽';
    document.getElementById('pg-profile').innerHTML = `
      <div style="text-align:center;padding-top:10px">
        <div class="ava">👤</div>
        <div class="p-name">${esc(S.user.nickname || nick())}</div>
        <div class="p-age">${S.user.age ? S.user.age+' лет' : 'Возраст не указан'}</div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-v">${S.user.balance.toFixed(0)} ₽</div><div class="stat-l">Баланс</div></div>
        <div class="stat"><div class="stat-v">ID</div><div class="stat-l" style="word-break:break-all">${myId}</div></div>
      </div>
      <button class="btn btn-pr" onclick="goEditProfile()">✏️ Редактировать профиль</button>
      <button class="btn btn-ol" onclick="goPage('wallet')">💰 Пополнить баланс</button>
      <button class="btn btn-ol" onclick="goSupport()">🆘 Поддержка</button>`;
  } catch(e) { empty('pg-profile','⚠️',e.message); }
}

// ── EDIT PROFILE ──────────────────────────────────────────
function goEditProfile() {
  const u = S.user;
  document.getElementById('pg-editprofile').innerHTML = `
    <button class="back" onclick="goPage('profile')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>Профиль
    </button>
    <div class="st">Редактировать профиль</div>
    <div class="field"><label>НИКНЕЙМ</label><input id="ep-nick" value="${esc(u?.nickname||'')}" placeholder="Твой ник" maxlength="30"></div>
    <div class="field"><label>ВОЗРАСТ</label><input id="ep-age" type="number" value="${u?.age||''}" placeholder="Сколько лет?" min="1" max="120"></div>
    <button class="btn btn-pr" onclick="saveProfile()">💾 Сохранить</button>
    <button class="btn btn-ol" onclick="goPage('profile')">Отмена</button>`;
  showPage('editprofile');
}

async function saveProfile() {
  const nick = document.getElementById('ep-nick')?.value?.trim();
  const age  = parseInt(document.getElementById('ep-age')?.value);
  if (!nick || nick.length > 30) { toast('⚠️ Никнейм от 1 до 30 символов'); return; }
  if (!age || age < 1 || age > 120) { toast('⚠️ Укажи реальный возраст'); return; }
  try {
    await api('/me/update','POST',{nickname:nick, age});
    toast('✅ Профиль обновлён!');
    S.user.nickname = nick; S.user.age = age;
    goPage('profile');
  } catch(e) { toast('❌ '+e.message); }
}

// ── SUPPORT ───────────────────────────────────────────────
async function goSupport() {
  const text = prompt('Опиши проблему:');
  if (!text?.trim()) return;
  try {
    await api('/support','POST',{message:text.trim()});
    toast('✅ Сообщение отправлено!');
  } catch(e) { toast('❌ '+e.message); }
}

// ── SEARCH ────────────────────────────────────────────────
async function doSearch() {
  const q = prompt('Поиск товаров:');
  if (!q?.trim()) return;
  const cats = ['signa','mugs','photos','videos'];
  S.cat = null;
  loader('pg-market');
  showPage('market');
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('nb-market').classList.add('on');
  try {
    let all = [];
    for (const c of cats) { const p = await api(`/products/${c}`); all = all.concat(p); }
    const res = all.filter(p => p.title.toLowerCase().includes(q.toLowerCase()) || (p.description||'').toLowerCase().includes(q.toLowerCase()));
    document.getElementById('pg-market').innerHTML = `
      <button class="back" onclick="S.cat=null;renderMarket()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        Поиск: «${esc(q)}»
      </button>
      <div class="prods">${res.length ? res.map(p=>`
        <div class="prod" onclick="openProduct(${p.id})">
          <div class="prod-thumb">📦</div>
          <div class="prod-info">
            <div class="prod-t">${esc(p.title)}</div>
            <div class="prod-s">@${esc(p.seller_nick)}</div>
            <div class="prod-p">${p.price} ₽</div>
          </div>
        </div>`).join('') : '<div class="empty"><div class="empty-i">🔍</div>Ничего не найдено</div>'}</div>`;
  } catch(e) { empty('pg-market','⚠️',e.message); }
}

// ── INIT ──────────────────────────────────────────────────
async function init() {
  renderMarket(); // сразу показываем категории
  const myId = uid();
  if (myId) {
    try {
      S.user = await api('/me');
      document.getElementById('hBal').textContent = S.user.balance.toFixed(0)+' ₽';
    } catch(e) {}
  }
  // Обновляем баланс каждую минуту
  setInterval(async () => {
    if (!uid()) return;
    try {
      const me = await api('/me');
      S.user = me;
      document.getElementById('hBal').textContent = me.balance.toFixed(0)+' ₽';
    } catch(e) {}
  }, 60000);
}

init();
</script>
</body>
</html>
