<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AnonPeak</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#08080f;--s1:#0f0f1a;--s2:#161625;--s3:#1e1e30;--br:#252538;--br2:#2f2f48;--ac:#7b5cf0;--ac2:#a78bfa;--gr:#10b981;--gr2:#34d399;--rd:#f43f5e;--yl:#f59e0b;--tx:#f1f0ff;--tx2:#a9a8c9;--tx3:#6b6a8a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
/* HEADER */
.hdr{position:sticky;top:0;z-index:50;background:rgba(8,8,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:10px 16px;gap:10px}
.hdr-logo{font-family:'Unbounded',sans-serif;font-weight:800;font-size:17px;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-ico{background:none;border:none;color:var(--tx3);cursor:pointer;padding:6px;display:flex;align-items:center;border-radius:8px}
/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(8,8,15,.97);backdrop-filter:blur(20px);border-top:1px solid var(--br);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;background:none;border:none;color:var(--tx3);font-family:'Manrope',sans-serif;font-size:10px;cursor:pointer;transition:color .2s;position:relative}
.nb.on{color:var(--ac2)}
.nb svg{width:20px;height:20px}
.nb-badge{position:absolute;top:4px;right:calc(50% - 14px);background:var(--rd);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;display:none}
.nb-badge.on{display:block}
/* PAGES */
.pg{display:none;padding:16px 16px 80px}
.pg.on{display:block;animation:fu .18s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
/* FULL SCREEN */
.fullpg{display:none;position:fixed;inset:0;z-index:60;background:var(--bg);flex-direction:column;overflow-y:auto}
.fullpg.on{display:flex}
/* COMMON */
.st{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--tx3);margin:20px 0 10px}
.st:first-child{margin-top:0}
.back{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--ac2);font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;cursor:pointer;padding:0 0 14px}
.btn{width:100%;padding:15px;border-radius:16px;border:none;font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .12s;margin-bottom:10px;display:block;text-align:center}
.btn:last-child{margin-bottom:0}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-pr{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff}
.btn-gr{background:var(--gr);color:#fff}
.btn-ol{background:transparent;border:1.5px solid var(--br2);color:var(--tx)}
.btn-yl{background:var(--yl);color:#000}
/* MARKET */
.cats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat{background:var(--s2);border:1px solid var(--br);border-radius:16px;padding:20px 16px;cursor:pointer;text-align:center;transition:all .15s}
.cat:active{transform:scale(.96)}
.cat-i{font-size:30px;margin-bottom:8px}
.cat-n{font-size:13px;font-weight:600}
.prods{display:flex;flex-direction:column;gap:8px}
.prod{background:var(--s2);border:1px solid var(--br);border-radius:16px;padding:14px;cursor:pointer;display:flex;gap:12px;transition:all .12s;position:relative}
.prod.premium{border-color:var(--yl);background:linear-gradient(135deg,rgba(245,158,11,.05),var(--s2))}
.prod:active{transform:scale(.98)}
.prem-badge{position:absolute;top:10px;right:10px;background:var(--yl);color:#000;font-size:9px;font-weight:800;padding:2px 7px;border-radius:8px}
.prod-thumb{width:54px;height:54px;border-radius:12px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.prod-thumb img{width:100%;height:100%;object-fit:cover}
/* PROFILE */
.prof-header{text-align:center;padding:20px 0 10px}
.prof-ava{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 12px;overflow:hidden;position:relative;cursor:pointer}
.prof-ava img{width:100%;height:100%;object-fit:cover}
.prof-name{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:700}
.prof-sub{color:var(--tx3);font-size:13px;margin:4px 0 0}
/* WALLET NEW DESIGN */
.wal-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.wal-card{background:var(--s2);border:1px solid var(--br);border-radius:18px;padding:16px;position:relative}
.wal-card-label{font-size:11px;color:var(--tx3);font-weight:600;display:flex;align-items:center;gap:4px;margin-bottom:8px}
.wal-card-info{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--tx3);display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;flex-shrink:0}
.wal-card-amount{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:800;color:var(--gr2)}
.wal-card-copy{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--tx3);cursor:pointer;padding:4px}
.wal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.wal-action{background:var(--s2);border:1px solid var(--br);border-radius:14px;padding:14px;cursor:pointer;text-align:center;transition:all .15s;font-weight:700;font-size:13px;font-family:'Manrope',sans-serif;color:var(--tx)}
.wal-action:active{transform:scale(.97)}
.wal-action.primary{background:rgba(123,92,240,.15);border-color:var(--ac);color:var(--ac2)}
.wal-history-label{font-size:11px;color:var(--rd);font-weight:700;letter-spacing:.5px;text-transform:uppercase;text-align:center;padding:20px;background:var(--s2);border-radius:14px;border:1px dashed var(--br2)}
/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat{background:var(--s2);border:1px solid var(--br);border-radius:16px;padding:14px;text-align:center}
.stat-v{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:700;color:var(--ac2)}
.stat-l{font-size:11px;color:var(--tx3);margin-top:3px}
/* MSGS */
.conv-list{display:flex;flex-direction:column}
.conv-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--br);cursor:pointer;transition:all .12s}
.conv-item:active{opacity:.7}
.conv-ava{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.conv-ava img{width:100%;height:100%;object-fit:cover}
.conv-ava.support{background:linear-gradient(135deg,#0ea5e9,#6366f1)}
.conv-ava.gc{background:linear-gradient(135deg,var(--gr),var(--ac))}
.conv-body{flex:1;min-width:0}
.conv-head{display:flex;justify-content:space-between;margin-bottom:3px}
.conv-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:65%}
.conv-time{font-size:11px;color:var(--tx3)}
.conv-preview{font-size:13px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-unread{background:var(--ac);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0;margin-left:6px}
/* CHAT */
.chat-container{display:flex;flex-direction:column;height:100%;overflow:hidden}
.chat-hdr{background:var(--s2);border-bottom:1px solid var(--br);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-hdr-ava{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;overflow:hidden}
.chat-hdr-ava img{width:100%;height:100%;object-fit:cover}
.chat-hdr-name{font-weight:700;font-size:14px}
.chat-hdr-sub{font-size:11px;color:var(--tx3)}
.msgs-area{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:6px;padding-bottom:8px}
.msg{max-width:80%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word}
.msg-o{background:linear-gradient(135deg,var(--ac),#5a3fd4);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg-i{background:var(--s3);color:var(--tx);align-self:flex-start;border-bottom-left-radius:4px}
.msg-nick{font-size:11px;color:var(--ac2);margin-bottom:2px;padding:0 4px;align-self:flex-start}
.msg-admin{font-size:11px;color:var(--yl);margin-bottom:2px;padding:0 4px;align-self:flex-start}
.msg-t{font-size:10px;opacity:.6;margin-top:3px;text-align:right}
.chat-input-bar{background:rgba(8,8,15,.97);backdrop-filter:blur(20px);border-top:1px solid var(--br);padding:10px 16px calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;flex-shrink:0}
.cinput{flex:1;background:var(--s3);border:1.5px solid var(--br);border-radius:24px;padding:10px 16px;color:var(--tx);font-family:'Manrope',sans-serif;font-size:14px;outline:none}
.cinput:focus{border-color:var(--ac)}
.csend{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.csend:active{transform:scale(.9)}
/* ORDER CARD IN CHAT */
.ord-card-chat{background:var(--s2);border:1px solid var(--br);border-radius:14px;padding:14px;margin:8px 0}
/* FORM */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--tx3);font-weight:700;margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
.field input,.field textarea,.field select{width:100%;background:var(--s2);border:1.5px solid var(--br);border-radius:12px;padding:12px 14px;color:var(--tx);font-family:'Manrope',sans-serif;font-size:14px;outline:none;-webkit-appearance:none;transition:border-color .2s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--ac)}
.field textarea{resize:none;height:80px}
.field select option{background:var(--s2)}
/* PREM TOGGLE */
.prem-card{background:var(--s2);border:1.5px solid var(--br);border-radius:16px;padding:16px;cursor:pointer;transition:all .15s;margin-bottom:12px}
.prem-card.on{border-color:var(--yl);background:rgba(245,158,11,.08)}
.prem-card:active{transform:scale(.98)}
/* SELL TYPE SELECT */
.sell-type-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.sell-type-card{background:var(--s2);border:2px solid var(--br);border-radius:18px;padding:18px 14px;cursor:pointer;text-align:center;transition:all .15s}
.sell-type-card:active{transform:scale(.97)}
.sell-type-card.on{border-color:var(--ac)}
.sell-type-card.on.prem{border-color:var(--yl)}
.sell-type-icon{font-size:28px;margin-bottom:8px}
.sell-type-name{font-weight:700;font-size:14px;margin-bottom:4px}
.sell-type-desc{font-size:11px;color:var(--tx3);line-height:1.5}
.sell-type-price{font-size:12px;font-weight:700;margin-top:8px}
/* WALLET TOPUP */
.amts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.amt-btn{background:var(--s2);border:1.5px solid var(--br);border-radius:12px;padding:13px 4px;font-size:13px;font-weight:700;color:var(--tx);cursor:pointer;transition:all .12s;font-family:'Manrope',sans-serif}
.amt-btn.sel{border-color:var(--ac);color:var(--ac2);background:rgba(123,92,240,.15)}
.custom-row{display:flex;gap:8px;margin-bottom:14px}
.cinp-sm{flex:1;background:var(--s2);border:1.5px solid var(--br);border-radius:12px;padding:12px 14px;color:var(--tx);font-family:'Manrope',sans-serif;font-size:15px;outline:none;-webkit-appearance:none}
.cinp-sm:focus{border-color:var(--ac)}
.pay-code{background:var(--s1);border:2px solid var(--gr);border-radius:12px;padding:16px;text-align:center;cursor:pointer;margin:12px 0;font-size:18px;font-weight:800;color:var(--gr2);letter-spacing:2px;font-family:'Unbounded',sans-serif}
/* MISC */
.g-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.g-btn{background:var(--s2);border:1.5px solid var(--br);border-radius:12px;padding:12px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;color:var(--tx3);cursor:pointer;text-align:center;transition:all .15s}
.g-btn.sel{border-color:var(--ac);color:var(--ac2);background:rgba(123,92,240,.1)}
.info-box{background:var(--s2);border:1px solid var(--br);border-radius:14px;padding:14px;margin-bottom:14px;font-size:13px;color:var(--tx2);line-height:1.7}
.w-calc{background:linear-gradient(135deg,#0a1525,#140e2a);border:1px solid #2a1f50;border-radius:16px;padding:16px;margin-bottom:14px;text-align:center}
.w-stars{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:800;color:var(--yl);margin:8px 0}
.hr{height:1px;background:var(--br);margin:16px 0}
/* TOAST */
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--s3);border:1px solid var(--br2);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;max-width:85vw;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
/* POPUP */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.popup-box{background:var(--s2);border:1px solid var(--br2);border-radius:24px;padding:28px 24px;max-width:320px;width:100%;text-align:center}
.popup-title{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:700;margin-bottom:10px}
.popup-text{font-size:13px;color:var(--tx2);line-height:1.7;margin-bottom:20px}
/* LOADER */
.loader{text-align:center;padding:50px;color:var(--tx3)}
.spin{width:30px;height:30px;border-radius:50%;border:2.5px solid var(--br2);border-top-color:var(--ac);animation:sp .7s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px 20px;color:var(--tx3)}
.empty-i{font-size:40px;margin-bottom:10px}
/* CTX MENU */
.ctx-overlay{position:fixed;inset:0;z-index:300}
.ctx-menu{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--s3);border:1px solid var(--br2);border-radius:16px;padding:8px;z-index:301;min-width:220px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.ctx-btn{display:block;width:100%;background:none;border:none;color:var(--tx);font-family:'Manrope',sans-serif;font-size:14px;padding:12px 16px;text-align:left;cursor:pointer;border-radius:10px;font-weight:500}
.ctx-btn:active{background:var(--s2)}
.ctx-btn.danger{color:var(--rd)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">ANONPEAK</div>
  <button class="hdr-ico" onclick="goSearch()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
  <button class="hdr-ico" id="hdr-settings" onclick="goSettings()" style="display:none"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <div style="background:var(--s3);border:1px solid var(--br);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--gr2);cursor:pointer" id="hBal" onclick="goPage('wallet')">0 ₽</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- PAGES -->
<div class="pg on" id="pg-market"></div>
<div class="pg" id="pg-sell"></div>
<div class="pg" id="pg-msgs"></div>
<div class="pg" id="pg-wallet"></div>
<div class="pg" id="pg-profile"></div>

<!-- FULL SCREEN PAGES -->
<div class="fullpg" id="fp-chat"><div class="chat-container" id="chat-inner"></div></div>
<div class="fullpg" id="fp-product"><div id="product-inner" style="padding:16px 16px 80px;overflow-y:auto;flex:1"></div></div>
<div class="fullpg" id="fp-settings"><div id="settings-inner" style="padding:16px 16px 80px;overflow-y:auto;flex:1"></div></div>
<div class="fullpg" id="fp-userprofile"><div id="userprofile-inner" style="padding:16px 16px 80px;overflow-y:auto;flex:1"></div></div>
<div class="fullpg" id="fp-topup"><div id="topup-inner" style="padding:16px 16px 80px;overflow-y:auto;flex:1"></div></div>
<div class="fullpg" id="fp-withdraw"><div id="withdraw-inner" style="padding:16px 16px 80px;overflow-y:auto;flex:1"></div></div>
<div class="fullpg" id="fp-search"><div id="search-inner" style="padding:16px 16px 80px;overflow-y:auto;flex:1"></div></div>
<div class="fullpg" id="fp-selltype"><div id="selltype-inner" style="padding:16px 16px 80px;overflow-y:auto;flex:1"></div></div>

<nav class="nav">
  <button class="nb on" id="nb-market" onclick="goPage('market')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Маркет
  </button>
  <button class="nb" id="nb-sell" onclick="goPage('sell')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Продать
  </button>
  <button class="nb" id="nb-msgs" onclick="goPage('msgs')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Сообщения
    <span class="nb-badge" id="badge-msgs"></span>
  </button>
  <button class="nb" id="nb-wallet" onclick="goPage('wallet')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>Кошелёк
  </button>
  <button class="nb" id="nb-profile" onclick="goPage('profile')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Профиль
  </button>
</nav>

<audio id="snd" preload="auto"><source src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

<script>
const API='https://anonpeak-production.up.railway.app';
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}
const S={page:'market',user:null,cat:null,chatInterval:null,gcInterval:null,gender:'',selAmt:0,isPrem:false,sellData:null};
const esc=s=>s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';
const uid=()=>tg?.initDataUnsafe?.user?.id||null;

function playSound(){try{document.getElementById('snd')?.play();}catch(e){}}
function toast(msg,ms=2500){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),ms);}

async function api(path,body=null){
  const u=uid();const params=new URLSearchParams();
  if(u) params.set('uid',String(u));
  if(body) for(const[k,v]of Object.entries(body)) if(v!==null&&v!==undefined) params.set(k,String(v));
  const url=API+path+(params.toString()?'?'+params.toString():'');
  try{
    const r=await fetch(url);
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||'HTTP '+r.status);}
    return r.json();
  }catch(e){throw new Error(e.message||'Ошибка соединения');}
}

async function refreshOrderMsgs(orderId){
  if(S.page!=='chat'){clearInterval(S.chatInterval);S.chatInterval=null;return;}
  try{
    const msgs=await api('/orders/'+orderId+'/messages');const myId=uid();
    const el=document.getElementById('cmsgs');if(!el)return;
    const atBot=el.scrollHeight-el.scrollTop-el.offsetHeight<80;
    const card=el.querySelector('.ord-card-chat');
    const prev=el.querySelectorAll('.msg').length;
    Array.from(el.children).forEach(c=>{if(!c.classList.contains('ord-card-chat'))c.remove();});
    const html=msgs.map(m=>`<div style="display:flex;flex-direction:column;align-items:${m.sender_id===myId?'flex-end':'flex-start'}">

async function buildGlobalChat(){
  const msgs=await api('/chat/messages');const myId=uid();gcPrev=msgs.length;
  document.getElementById('chat-inner').innerHTML=`

      <button onclick="closeChat()" style="background:none;border:none;color:var(--ac2);cursor:pointer;padding:4px;display:flex"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></button>

    </div>
    <div class="msgs-area" id="gcmsgs">
      ${msgs.length?msgs.filter(m=>!blockedUsers.includes(m.user_id)).map(m=>{
        const isMe=m.user_id===myId;
        return`<div style="display:flex;flex-direction:column;align-items:${isMe?'flex-end':'flex-start'}">

    <div class="chat-input-bar">
      <input class="cinput" id="gc-inp" placeholder="Написать..." onkeydown="if(event.key==='Enter')gcSend()">
      <button class="csend" onclick="gcSend()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </div>`;
  scrollChat('gcmsgs');
}
async function refreshGlobalChat(){
  if(S.page!=='chat'){clearInterval(S.gcInterval);S.gcInterval=null;return;}
  try{
    const msgs=await api('/chat/messages');const myId=uid();
    const el=document.getElementById('gcmsgs');if(!el)return;
    const atBot=el.scrollHeight-el.scrollTop-el.offsetHeight<80;
    if(msgs.length>gcPrev)playSound();gcPrev=msgs.length;
    el.innerHTML=msgs.length?msgs.filter(m=>!blockedUsers.includes(m.user_id)).map(m=>{
      const isMe=m.user_id===myId;
      return`<div style="display:flex;flex-direction:column;align-items:${isMe?'flex-end':'flex-start'}">
        ${!isMe?`<div class="msg-nick" style="cursor:pointer" onclick="openUserProfile(${m.user_id})">${esc(m.nickname)}</div>`:''}
        <div class="msg ${isMe?'msg-o':'msg-i'}" onclick="showCtx(${m.id},${m.user_id},'${esc(m.nickname)}',${isMe})">${esc(m.message)}<div class="msg-t">${(m.created_at||'').slice(11,16)}</div></div>
      </div>`;}).join(''):'<div style="text-align:center;color:var(--tx3);font-size:13px;padding:20px">Будь первым 👋</div>';
    if(atBot)scrollChat('gcmsgs');
  }catch(e){}
}
async function gcSend(){
  const inp=document.getElementById('gc-inp');const text=inp?.value?.trim();
  if(!text)return;inp.value='';
  try{await api('/chat/send',{message:text});await refreshGlobalChat();scrollChat('gcmsgs');}
  catch(e){toast('❌ '+e.message);}
}
function showCtx(msgId,userId,nick,isMe){
  const ov=document.createElement('div');ov.className='ctx-overlay';
  const m=document.createElement('div');m.className='ctx-menu';
  const items=[];
  if(isMe)items.push({t:'🗑 Удалить',cls:'danger',fn:()=>gcDelete(msgId)});
  const isBlocked=blockedUsers.includes(userId);
  if(!isMe)items.push({t:`👤 Профиль ${nick}`,cls:'',fn:()=>openUserProfile(userId)});
  if(!isMe&&!isBlocked)items.push({t:`🚫 Заблокировать`,cls:'danger',fn:()=>gcBlock(userId,nick)});
  if(!isMe&&isBlocked)items.push({t:`✅ Разблокировать`,cls:'',fn:()=>gcUnblock(userId,nick)});
  items.push({t:'Отмена',cls:'',fn:()=>{}});
  m.innerHTML=items.map(i=>`<button class="ctx-btn ${i.cls||''}">${i.t}</button>`).join('');
  m.querySelectorAll('.ctx-btn').forEach((btn,i)=>{btn.onclick=()=>{items[i].fn();ov.remove();m.remove();};});
  ov.onclick=()=>{ov.remove();m.remove();};
  document.body.appendChild(ov);document.body.appendChild(m);
}
async function gcDelete(msgId){try{await api('/chat/delete',{msg_id:msgId});await refreshGlobalChat();}catch(e){toast('❌ '+e.message);}}
function gcBlock(u,n){if(!blockedUsers.includes(u)){blockedUsers.push(u);try{localStorage.setItem('blocked',JSON.stringify(blockedUsers));}catch(e){}toast('🚫 '+n+' заблокирован');refreshGlobalChat();}}
function gcUnblock(u,n){blockedUsers=blockedUsers.filter(id=>id!==u);try{localStorage.setItem('blocked',JSON.stringify(blockedUsers));}catch(e){}toast('✅ '+n+' разблокирован');refreshGlobalChat();}

function applyCustom(){

function copyCode(t){

    try{document.execCommand('copy');toast('✅ Скопировано!');}catch(e){}document.body.removeChild(ta);
  });
}

// Выбор аватарки из галереи
function pickAvatar(){
  const input=document.createElement('input');input.type='file';input.accept='image/*';
  input.onchange=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      const dataUrl=ev.target.result;
      // Сохраняем как data URL (base64) — простой вариант без сервера
      try{
        await api('/me/set_avatar',{avatar_url:dataUrl.slice(0,500)});
        // Локально обновляем
        if(S.user) S.user.avatar_url=dataUrl;
        const ava=document.querySelector('.prof-ava');
        if(ava) ava.innerHTML=`<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"><div style="position:absolute;bottom:0;right:0;width:26px;height:26px;background:var(--ac);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px">📷</div>`;
        toast('✅ Аватарка обновлена!');
      }catch(err){toast('❌ '+err.message);}
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

}

function pickAvatarSettings(){
  const input=document.createElement('input');input.type='file';input.accept='image/*';
  input.onchange=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const dataUrl=ev.target.result;
      if(S.user) S.user.avatar_url=dataUrl;
      const ava=document.querySelector('#settings-inner .prof-ava');
      if(ava) ava.innerHTML=`<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"><div style="position:absolute;bottom:0;right:0;width:26px;height:26px;background:var(--ac);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px">📷</div>`;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function selGender(g){S.gender=g;document.getElementById('g-male').classList.toggle('sel',g==='male');document.getElementById('g-female').classList.toggle('sel',g==='female');}

async function saveProfile(){
  const nick=document.getElementById('ep-nick')?.value?.trim();
  const age=parseInt(document.getElementById('ep-age')?.value||'0');
  if(!nick||nick.length>30){toast('⚠️ Никнейм 1-30 символов');return;}
  if(!age||age<1||age>120){toast('⚠️ Укажи возраст');return;}
  try{
    await api('/me/update',{nickname:nick,age,gender:S.gender||''});
    // Сохраняем аватарку если была выбрана
    if(S.user?.avatar_url&&S.user.avatar_url.startsWith('data:')){
      try{await api('/me/set_avatar',{avatar_url:S.user.avatar_url.slice(0,500)});}catch(e){}
    }
    toast('✅ Сохранено!');if(S.user){S.user.nickname=nick;S.user.age=age;S.user.gender=S.gender;}
    backToPage('profile');
  }catch(e){toast('❌ '+e.message);}
}

// ── SEARCH ───────────────────────────────────────────────
function goSearch(){
  document.getElementById('search-inner').innerHTML=`
    <div style="padding:16px 16px 80px">
      <button class="back" onclick="backToPage('market')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>Назад</button>
      <div class="field"><label>Поиск товаров</label><input id="srch" placeholder="Название..." autofocus oninput="doSearch(this.value)"></div>
      <div id="srch-res"><div class="empty"><div class="empty-i">🔍</div>Начни вводить...</div></div>
    </div>`;
  showFull('search');
  setTimeout(()=>document.getElementById('srch')?.focus(),100);
}
let srchT=null;
async function doSearch(q){
  clearTimeout(srchT);const el=document.getElementById('srch-res');
  if(!q||q.length<2){if(el)el.innerHTML='<div class="empty"><div class="empty-i">🔍</div>Начни вводить...</div>';return;}
  srchT=setTimeout(async()=>{
    if(el)el.innerHTML='<div class="loader"><div class="spin"></div></div>';
    try{
      let all=[];for(const c of['signa','mugs','photos','videos']){const p=await api('/products/'+c);all=all.concat(p);}
      const found=all.filter(p=>p.title.toLowerCase().includes(q.toLowerCase())||(p.description||'').toLowerCase().includes(q.toLowerCase()));
      if(el)el.innerHTML=found.length
        ?`<div class="prods">${found.map(p=>`<div class="prod" onclick="openProduct(${p.id})"><div class="prod-thumb">📦</div><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14px;margin-bottom:3px">${esc(p.title)}</div><div style="font-size:11px;color:var(--tx3)">${esc(p.seller_nick)}</div><div style="font-weight:700;font-size:14px;color:var(--gr2)">${p.price} ₽</div></div></div>`).join('')}</div>`
        :'<div class="empty"><div class="empty-i">🔍</div>Ничего не найдено</div>';
    }catch(e){if(el)el.innerHTML=`<div class="empty"><div class="empty-i">⚠️</div>${e.message}</div>`;}
  },400);
}

// ── UNREAD CHECK ─────────────────────────────────────────
let prevUnread=0;
async function checkUnread(){
  if(!uid())return;
  try{
    const orders=await api('/orders');const total=orders.reduce((s,o)=>s+(o.unread||0),0);
    const badge=document.getElementById('badge-msgs');
    if(badge){if(total>0){badge.textContent=total>9?'9+':total;badge.classList.add('on');}else badge.classList.remove('on');}
    if(total>prevUnread&&S.page!=='chat'&&S.page!=='msgs')playSound();
    prevUnread=total;
  }catch(e){}
}

// ── INIT ─────────────────────────────────────────────────
async function init(){
  renderMarket();
  if(uid()){
    try{S.user=await api('/me');document.getElementById('hBal').textContent=S.user.balance.toFixed(0)+' ₽';}catch(e){}
  }
  setInterval(async()=>{if(!uid())return;try{S.user=await api('/me');document.getElementById('hBal').textContent=S.user.balance.toFixed(0)+' ₽';}catch(e){}},60000);
  setInterval(checkUnread,15000);checkUnread();
}
init();
</script>
