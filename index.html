<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AnonPeak</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#08080f;--s1:#0f0f1a;--s2:#161625;--s3:#1e1e30;--br:#252538;--br2:#2f2f48;--ac:#7b5cf0;--ac2:#a78bfa;--gr:#10b981;--gr2:#34d399;--rd:#f43f5e;--yl:#f59e0b;--tx:#f1f0ff;--tx2:#a9a8c9;--tx3:#6b6a8a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
.hdr{position:sticky;top:0;z-index:50;background:rgba(8,8,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:10px 16px;gap:10px}
.hdr-logo{font-family:'Unbounded',sans-serif;font-weight:800;font-size:17px;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-bal{margin-left:auto;background:var(--s3);border:1px solid var(--br);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--gr2);cursor:pointer}
.hdr-ico{background:none;border:none;color:var(--tx3);cursor:pointer;padding:6px;display:flex;align-items:center;border-radius:8px}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(8,8,15,.97);backdrop-filter:blur(20px);border-top:1px solid var(--br);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;background:none;border:none;color:var(--tx3);font-family:'Manrope',sans-serif;font-size:10px;cursor:pointer;transition:color .2s;position:relative}
.nb.on{color:var(--ac2)}
.nb svg{width:20px;height:20px}
.nb-badge{position:absolute;top:4px;right:calc(50% - 14px);background:var(--rd);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;display:none}
.nb-badge.on{display:block}
.pg{display:none;padding:16px 16px 80px}
.pg.on{display:block;animation:fu .18s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.st{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--tx3);margin:20px 0 10px}
.st:first-child{margin-top:0}
/* MARKET */
.cats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat{background:var(--s2);border:1px solid var(--br);border-radius:16px;padding:20px 16px;cursor:pointer;transition:all .15s;text-align:center}
.cat:active{transform:scale(.96)}
.cat-i{font-size:30px;margin-bottom:8px}
.cat-n{font-size:13px;font-weight:600}
.prods{display:flex;flex-direction:column;gap:8px}
.prod{background:var(--s2);border:1px solid var(--br);border-radius:16px;padding:14px;cursor:pointer;display:flex;gap:12px;transition:all .12s;position:relative}
.prod.premium{border-color:var(--yl);background:linear-gradient(135deg,rgba(245,158,11,.05),var(--s2))}
.prod:active{transform:scale(.98)}
.prem-badge{position:absolute;top:10px;right:10px;background:var(--yl);color:#000;font-size:9px;font-weight:800;padding:2px 7px;border-radius:8px}
.prod-thumb{width:54px;height:54px;border-radius:12px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.prod-t{font-weight:700;font-size:14px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-s{font-size:11px;color:var(--tx3);margin-bottom:4px}
.prod-p{font-weight:700;font-size:15px;color:var(--gr2)}
/* DETAIL */
.det-media{width:100%;aspect-ratio:1;border-radius:20px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:64px;margin-bottom:16px}
.det-t{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px}
.det-s{color:var(--tx3);font-size:13px;margin-bottom:8px}
.det-d{color:var(--tx2);font-size:14px;line-height:1.6;margin-bottom:16px}
.det-p{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:800;color:var(--gr2);margin-bottom:20px}
/* BTNS */
.btn{width:100%;padding:15px;border-radius:16px;border:none;font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .12s;margin-bottom:10px;display:block;text-align:center}
.btn:last-child{margin-bottom:0}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-pr{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff}
.btn-gr{background:var(--gr);color:#fff}
.btn-ol{background:transparent;border:1.5px solid var(--br2);color:var(--tx)}
.btn-yl{background:var(--yl);color:#000}
.back{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--ac2);font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;cursor:pointer;padding:0 0 14px}
/* MSGS LIST */
.conv-list{display:flex;flex-direction:column}
.conv-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--br);cursor:pointer;transition:background .12s}
.conv-item:active{background:var(--s2);margin:0 -16px;padding:12px 16px;border-radius:0}
.conv-ava{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;position:relative}
.conv-ava.support{background:linear-gradient(135deg,#0ea5e9,#6366f1)}
.conv-ava.globalchat{background:linear-gradient(135deg,var(--gr),var(--ac))}
.conv-online{position:absolute;bottom:2px;right:2px;width:10px;height:10px;background:var(--gr);border-radius:50%;border:2px solid var(--bg)}
.conv-body{flex:1;min-width:0}
.conv-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.conv-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%}
.conv-time{font-size:11px;color:var(--tx3);flex-shrink:0}
.conv-preview{font-size:13px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
.conv-unread{background:var(--ac);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;flex-shrink:0;margin-left:auto}
/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 57px - env(safe-area-inset-bottom));padding:0}
.chat-hdr{background:var(--s2);border-bottom:1px solid var(--br);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-hdr-ava{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.chat-hdr-info{flex:1}
.chat-hdr-name{font-weight:700;font-size:14px}
.chat-hdr-sub{font-size:11px;color:var(--tx3)}
/* ORDER CARD in chat */
.order-card-chat{background:var(--s2);border:1px solid var(--br);border-radius:14px;padding:14px;margin:8px 16px;cursor:pointer}
.order-card-chat-head{display:flex;align-items:center;gap:10px}
.order-card-chat-icon{font-size:24px}
.order-card-chat-title{font-weight:600;font-size:13px}
.order-card-chat-sub{font-size:11px;color:var(--tx3);margin-top:2px}
.order-card-chat-price{font-weight:700;font-size:14px;color:var(--gr2);margin-top:6px}
/* MSGS AREA */
.msgs-wrap{flex:1;overflow-y:auto;padding:8px 16px;display:flex;flex-direction:column;gap:6px;padding-bottom:4px}
.msg{max-width:80%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word}
.msg-o{background:linear-gradient(135deg,var(--ac),#5a3fd4);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg-i{background:var(--s3);color:var(--tx);align-self:flex-start;border-bottom-left-radius:4px}
.msg-nick{font-size:11px;color:var(--ac2);margin-bottom:2px;padding:0 4px;align-self:flex-start}
.msg-t{font-size:10px;opacity:.6;margin-top:3px;text-align:right}
/* INPUT */
.chat-input-bar{background:rgba(8,8,15,.97);backdrop-filter:blur(20px);border-top:1px solid var(--br);padding:10px 16px calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;flex-shrink:0}
.cinput{flex:1;background:var(--s3);border:1.5px solid var(--br);border-radius:24px;padding:10px 16px;color:var(--tx);font-family:'Manrope',sans-serif;font-size:14px;outline:none}
.cinput:focus{border-color:var(--ac)}
.csend{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.csend:active{transform:scale(.9)}
/* SELL */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--tx3);font-weight:700;margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
.field input,.field textarea,.field select{width:100%;background:var(--s2);border:1.5px solid var(--br);border-radius:12px;padding:12px 14px;color:var(--tx);font-family:'Manrope',sans-serif;font-size:14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--ac)}
.field textarea{resize:none;height:80px}
.field select option{background:var(--s2)}
.prem-toggle{background:var(--s2);border:1.5px solid var(--br);border-radius:16px;padding:16px;margin-bottom:14px;cursor:pointer;transition:all .15s}
.prem-toggle.on{border-color:var(--yl);background:rgba(245,158,11,.08)}
/* WALLET */
.w-card{background:linear-gradient(135deg,#140e2a,#0a1525);border:1px solid #2a1f50;border-radius:20px;padding:24px;text-align:center;margin-bottom:20px}
.w-label{font-size:11px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.w-amt{font-family:'Unbounded',sans-serif;font-size:38px;font-weight:800;color:var(--gr2)}
.amts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.amt-btn{background:var(--s2);border:1.5px solid var(--br);border-radius:12px;padding:13px 4px;font-size:13px;font-weight:700;color:var(--tx);cursor:pointer;transition:all .12s;font-family:'Manrope',sans-serif}
.amt-btn.sel{border-color:var(--ac);color:var(--ac2);background:rgba(123,92,240,.15)}
.amt-btn:active{transform:scale(.95)}
.pay-code{background:var(--s1);border:2px solid var(--gr);border-radius:12px;padding:16px;text-align:center;cursor:pointer;margin:12px 0;font-size:18px;font-weight:800;color:var(--gr2);letter-spacing:2px;font-family:'Unbounded',sans-serif}
.custom-row{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.cinp-sm{flex:1;background:var(--s2);border:1.5px solid var(--br);border-radius:12px;padding:12px 14px;color:var(--tx);font-family:'Manrope',sans-serif;font-size:15px;outline:none;-webkit-appearance:none}
.cinp-sm:focus{border-color:var(--ac)}
/* PROFILE */
.ava{width:84px;height:84px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 12px}
.p-name{text-align:center;font-family:'Unbounded',sans-serif;font-size:20px;font-weight:700}
.p-sub{text-align:center;color:var(--tx3);font-size:13px;margin:4px 0 20px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat{background:var(--s2);border:1px solid var(--br);border-radius:16px;padding:14px;text-align:center}
.stat-v{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:700;color:var(--ac2)}
.stat-l{font-size:11px;color:var(--tx3);margin-top:3px}
.g-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.g-btn{background:var(--s2);border:1.5px solid var(--br);border-radius:12px;padding:12px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;color:var(--tx3);cursor:pointer;text-align:center;transition:all .15s}
.g-btn.sel{border-color:var(--ac);color:var(--ac2);background:rgba(123,92,240,.1)}
/* MISC */
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--s3);border:1px solid var(--br2);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;max-width:85vw;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.loader{text-align:center;padding:50px;color:var(--tx3)}
.spin{width:30px;height:30px;border-radius:50%;border:2.5px solid var(--br2);border-top-color:var(--ac);animation:sp .7s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px 20px;color:var(--tx3)}
.empty-i{font-size:40px;margin-bottom:10px}
.hr{height:1px;background:var(--br);margin:16px 0}
.info-box{background:var(--s2);border:1px solid var(--br);border-radius:14px;padding:14px;margin-bottom:14px;font-size:13px;color:var(--tx2);line-height:1.7}
.w-calc{background:linear-gradient(135deg,#0a1525,#140e2a);border:1px solid #2a1f50;border-radius:16px;padding:16px;margin-bottom:14px;text-align:center}
.w-stars{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:800;color:var(--yl);margin:8px 0}
/* CONTEXT MENU */
.ctx-menu{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--s3);border:1px solid var(--br2);border-radius:16px;padding:8px;z-index:999;min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.ctx-overlay{position:fixed;inset:0;z-index:998}
.ctx-btn{display:block;width:100%;background:none;border:none;color:var(--tx);font-family:'Manrope',sans-serif;font-size:14px;padding:12px 16px;text-align:left;cursor:pointer;border-radius:10px;font-weight:500}
.ctx-btn:active{background:var(--s2)}
.ctx-btn.danger{color:var(--rd)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">ANONPEAK</div>
  <button class="hdr-ico" onclick="goSearch()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
  <button class="hdr-ico" onclick="openSupport()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="currentColor"/></svg></button>
  <div class="hdr-bal" id="hBal" onclick="goPage('wallet')">0 ₽</div>
</div>
<div class="toast" id="toast"></div>

<!-- PAGES -->
<div class="pg on" id="pg-market"></div>
<div class="pg" id="pg-sell"></div>
<div class="pg" id="pg-msgs"></div>
<div class="pg" id="pg-wallet"></div>
<div class="pg" id="pg-profile"></div>
<div class="pg" id="pg-product"></div>
<div class="pg" id="pg-editprofile"></div>
<div class="pg" id="pg-topup"></div>
<div class="pg" id="pg-withdraw"></div>
<div class="pg" id="pg-search"></div>
<!-- FULL-SCREEN CHAT (no nav) -->
<div id="pg-chat" style="display:none;position:fixed;inset:0;z-index:60;background:var(--bg);flex-direction:column"></div>

<nav class="nav">
  <button class="nb on" id="nb-market" onclick="goPage('market')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Маркет
  </button>
  <button class="nb" id="nb-sell" onclick="goPage('sell')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Продать
  </button>
  <button class="nb" id="nb-msgs" onclick="goPage('msgs')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Сообщения
    <span class="nb-badge" id="badge-msgs"></span>
  </button>
  <button class="nb" id="nb-wallet" onclick="goPage('wallet')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>Кошелёк
  </button>
  <button class="nb" id="nb-profile" onclick="goPage('profile')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Профиль
  </button>
</nav>

<audio id="snd" preload="auto"><source src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

<script>
const API = 'https://anonpeak-production.up.railway.app';
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const S = { page:'market', user:null, cat:null, chatInterval:null, gcInterval:null, gender:'', selAmt:0, isPrem:false };
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
const uid = () => tg?.initDataUnsafe?.user?.id || null;
const SELL_C=0.16, WD_C=0.05, STAR_R=1.4, PREM_P=9, MIN_P=15, MIN_WD=100;
let blockedUsers = [];
try { blockedUsers = JSON.parse(localStorage.getItem('blocked')||'[]'); } catch(e) {}

function playSound() { try { document.getElementById('snd')?.play(); } catch(e) {} }
function toast(msg, ms=2500) {
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),ms);
}

async function api(path, body=null) {
  const u=uid();
  const params=new URLSearchParams();
  if (u) params.set('uid',String(u));
  if (body) for (const [k,v] of Object.entries(body)) if (v!==null&&v!==undefined) params.set(k,String(v));
  const url=API+path+(params.toString()?'?'+params.toString():'');
  try {
    const r=await fetch(url);
    if (!r.ok) { const e=await r.json().catch(()=>({})); throw new Error(e.detail||'HTTP '+r.status); }
    return r.json();
  } catch(e) { throw new Error(e.message||'Ошибка соединения'); }
}

// ── NAV ──────────────────────────────────────────────────
function goPage(name) {
  if (S.gcInterval) { clearInterval(S.gcInterval); S.gcInterval=null; }
  if (S.chatInterval) { clearInterval(S.chatInterval); S.chatInterval=null; }
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+name)?.classList.add('on');
  document.getElementById('nb-'+name)?.classList.add('on');
  document.getElementById('pg-chat').style.display='none';
  S.page=name;
  ({market:renderMarket,sell:renderSell,msgs:renderMsgs,wallet:renderWallet,profile:renderProfile}[name]||function(){})();
}

function showFullPage(id) {
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById('pg-chat').style.display='none';
  if (id==='chat') { document.getElementById('pg-chat').style.display='flex'; }
  else { document.getElementById('pg-'+id)?.classList.add('on'); }
  S.page=id;
}

// ── MARKET ───────────────────────────────────────────────
function renderMarket() {
  if (S.cat) { renderProducts(S.cat); return; }
  document.getElementById('pg-market').innerHTML=`
    <div class="st">Категории</div>
    <div class="cats">
      <div class="cat" onclick="openCat('signa')"><div class="cat-i">🖊</div><div class="cat-n">Сигна</div></div>
      <div class="cat" onclick="openCat('mugs')"><div class="cat-i">☕</div><div class="cat-n">Кружки</div></div>
      <div class="cat" onclick="openCat('photos')"><div class="cat-i">📸</div><div class="cat-n">Фото</div></div>
      <div class="cat" onclick="openCat('videos')"><div class="cat-i">🎬</div><div class="cat-n">Видео</div></div>
    </div>`;
}

async function openCat(c) { S.cat=c; await renderProducts(c); }

async function renderProducts(catId) {
  const names={signa:'🖊 Сигна',mugs:'☕ Кружки',photos:'📸 Фото',videos:'🎬 Видео'};
  const el=document.getElementById('pg-market');

function togPrem() {
  S.isPrem=!S.isPrem;
  document.getElementById('prem-tog')?.classList.toggle('on',S.isPrem);
}

async function doSell() {
  const title=document.getElementById('s-title')?.value?.trim();
  const desc=document.getElementById('s-desc')?.value?.trim();
  const price=parseFloat(document.getElementById('s-price')?.value||'0');
  const cat=document.getElementById('s-cat')?.value;
  if (!title) { toast('⚠️ Введи название'); return; }

  if (!cat) { toast('⚠️ Выбери категорию'); return; }
  if (S.isPrem&&(S.user?.balance??0)<PREM_P) { toast(`❌ Нужно ${PREM_P} ₽ для топа`); setTimeout(()=>goPage('wallet'),800); return; }
  try {
    const r=await api('/products/create',{title,description:desc||'',price,category:cat,is_premium:S.isPrem});

async function refreshOrderMsgs(orderId) {
  if (S.page!=='chat') { clearInterval(S.chatInterval); S.chatInterval=null; return; }
  try {
    const msgs=await api('/orders/'+orderId+'/messages');
    const myId=uid(); const el=document.getElementById('cmsgs');
    if (!el) return;
    // Убираем карточку заказа при обновлении
    const orderCard=el.querySelector('.order-card-chat');
    const atBot=el.scrollHeight-el.scrollTop-el.offsetHeight<80;
    const prevCount=el.querySelectorAll('.msg').length;
    // Перерисовываем только сообщения (после карточки)
    const msgsHtml=msgs.map(m=>`
      <div style="display:flex;flex-direction:column;align-items:${m.sender_id===myId?'flex-end':'flex-start'}">
        <div class="msg ${m.sender_id===myId?'msg-o':'msg-i'}">${esc(m.text||'📎')}
          <div class="msg-t">${(m.created_at||'').slice(11,16)}</div>
        </div>
      </div>`).join('') || '<div style="text-align:center;color:var(--tx3);font-size:13px;padding:20px">Начни переписку 👋</div>';
    // Убираем старые сообщения, оставляем карточку
    Array.from(el.children).forEach(c=>{ if (!c.classList.contains('order-card-chat')) c.remove(); });
    el.insertAdjacentHTML('beforeend', msgsHtml);
    if (msgs.length>prevCount) { playSound(); }
    if (atBot) scrollChat('cmsgs');
  } catch(e) {}
}

let gcPrevCount=0;
async function refreshGlobalChat() {
  if (S.page!=='chat') { clearInterval(S.gcInterval); S.gcInterval=null; return; }
  try {
    const msgs=await api('/chat/messages'); const myId=uid();
    const el=document.getElementById('gcmsgs'); if (!el) return;
    const atBot=el.scrollHeight-el.scrollTop-el.offsetHeight<80;
    if (msgs.length>gcPrevCount) { playSound(); gcPrevCount=msgs.length; }
    el.innerHTML=msgs.length?msgs.filter(m=>!blockedUsers.includes(m.user_id)).map(m=>{
      const isMe=m.user_id===myId;
      return `<div style="display:flex;flex-direction:column;align-items:${isMe?'flex-end':'flex-start'}">
        ${!isMe?`<div class="msg-nick">${esc(m.nickname)}</div>`:''}
        <div class="msg ${isMe?'msg-o':'msg-i'}" onclick="showCtx(${m.id},${m.user_id},'${esc(m.nickname)}',${isMe})">${esc(m.message)}
          <div class="msg-t">${(m.created_at||'').slice(11,16)}</div>
        </div>
      </div>`;
    }).join(''):'<div style="text-align:center;color:var(--tx3);font-size:13px;padding:20px">Будь первым 👋</div>';

async function gcSend() {
  const inp=document.getElementById('gc-inp'); const text=inp?.value?.trim();
  if (!text) return; inp.value='';
  try { await api('/chat/send',{message:text}); await refreshGlobalChat(); scrollChat('gcmsgs'); }
  catch(e) { toast('❌ '+e.message); }
}

function showCtx(msgId, userId, nick, isMe) {
  const overlay=document.createElement('div'); overlay.className='ctx-overlay';
  const menu=document.createElement('div'); menu.className='ctx-menu';
  const items=[];
  if (isMe) items.push({text:'🗑 Удалить сообщение',cls:'danger',fn:()=>gcDelete(msgId)});
  const isBlocked=blockedUsers.includes(userId);
  if (!isMe && !isBlocked) items.push({text:`🚫 Заблокировать ${nick}`,cls:'danger',fn:()=>gcBlock(userId,nick)});
  if (!isMe && isBlocked) items.push({text:`✅ Разблокировать ${nick}`,cls:'',fn:()=>gcUnblock(userId,nick)});
  if (!isMe) items.push({text:`👤 ${nick}`,cls:'',fn:()=>toast('Профиль: '+nick)});
  items.push({text:'Отмена',cls:'',fn:()=>{}});
  menu.innerHTML=items.map(i=>`<button class="ctx-btn ${i.cls||''}">${i.text}</button>`).join('');
  menu.querySelectorAll('.ctx-btn').forEach((btn,i)=>{btn.onclick=()=>{items[i].fn();overlay.remove();menu.remove();};});
  overlay.onclick=()=>{overlay.remove();menu.remove();};
  document.body.appendChild(overlay); document.body.appendChild(menu);
}

async function gcDelete(msgId) {
  try { await api('/chat/delete',{msg_id:msgId}); await refreshGlobalChat(); } catch(e) { toast('❌ '+e.message); }
}
function gcBlock(userId,nick) {
  if (!blockedUsers.includes(userId)) { blockedUsers.push(userId); try{localStorage.setItem('blocked',JSON.stringify(blockedUsers));}catch(e){} toast('🚫 '+nick+' заблокирован'); refreshGlobalChat(); }
}
function gcUnblock(userId,nick) {
  blockedUsers=blockedUsers.filter(id=>id!==userId); try{localStorage.setItem('blocked',JSON.stringify(blockedUsers));}catch(e){} toast('✅ '+nick+' разблокирован'); refreshGlobalChat();
}

  el.innerHTML=`
    <div style="padding:16px 16px 80px">
      <button class="back" onclick="goPage('msgs')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>Назад</button>
      <div class="st">Поддержка</div>
      <div style="font-size:14px;color:var(--tx2);margin-bottom:16px;line-height:1.6">Опиши проблему — ответим как можно скорее</div>
      <div class="field"><label>Сообщение</label><textarea id="sup-text" placeholder="Что случилось?" style="height:120px"></textarea></div>
      <button class="btn btn-pr" onclick="sendSupport()">📨 Отправить</button>
    </div>`;
  showFullPage('search');
}

async function sendSupport() {
  const text=document.getElementById('sup-text')?.value?.trim();
  if (!text) { toast('⚠️ Напиши сообщение'); return; }
  if (!uid()) { toast('⚠️ Нужен Telegram'); return; }
  try { await api('/support',{message:text}); toast('✅ Отправлено!'); document.getElementById('sup-text').value=''; setTimeout(()=>goPage('msgs'),800); }
  catch(e) { toast('❌ '+e.message); }
}

// ── WALLET ───────────────────────────────────────────────
function renderWallet() {
  const bal=S.user?.balance??0;
  document.getElementById('pg-wallet').innerHTML=`
    <div class="w-card">
      <div class="w-label">Баланс</div>
      <div class="w-amt">${bal.toFixed(0)} ₽</div>
    </div>
    <div class="st">Пополнить</div>
    <div class="amts">${[100,250,500,1000,2500,5000].map(a=>`<button class="amt-btn" data-a="${a}" onclick="selAmt(${a})">${a} ₽</button>`).join('')}</div>
    <div class="custom-row">
      <input class="cinp-sm" id="custom-amt" type="number" inputmode="numeric" placeholder="Своя сумма (от 10 ₽)" min="10">
      <button class="btn btn-ol" style="width:auto;padding:12px 16px;margin:0;flex-shrink:0" onclick="applyCustom()">OK</button>
    </div>
    <button class="btn btn-pr" id="confirm-topup" onclick="confirmTopup()" disabled style="opacity:.4">Выбери сумму</button>
    <div class="hr"></div>
    <div class="st">Вывод в Stars ⭐</div>
    <div class="info-box">Комиссия 5% · Курс 1.4 ₽ = 1 ⭐ · Мин. 100 ₽</div>
    <button class="btn btn-ol" onclick="goWithdraw()">💸 Вывести средства</button>`;
}

function selAmt(a) {
  S.selAmt=a;
  document.querySelectorAll('.amt-btn').forEach(b=>b.classList.toggle('sel',parseInt(b.dataset.a)===a));
  if (document.getElementById('custom-amt')) document.getElementById('custom-amt').value='';
  const btn=document.getElementById('confirm-topup');
  if (btn) { btn.disabled=false; btn.style.opacity='1'; btn.textContent=`Перейти к оплате ${a} ₽ →`; }
}

function applyCustom() {
  const val=parseInt(document.getElementById('custom-amt')?.value||'0');
  if (!val||val<10) { toast('⚠️ Минимум 10 ₽'); return; }
  S.selAmt=val; document.querySelectorAll('.amt-btn').forEach(b=>b.classList.remove('sel'));
  const btn=document.getElementById('confirm-topup');
  if (btn) { btn.disabled=false; btn.style.opacity='1'; btn.textContent=`Перейти к оплате ${val} ₽ →`; }
}

async function confirmTopup() {
  if (!S.selAmt||S.selAmt<10) { toast('⚠️ Выбери сумму'); return; }
  if (!uid()) { toast('⚠️ Нужен Telegram'); return; }
  const btn=document.getElementById('confirm-topup');
  if (btn) { btn.disabled=true; btn.textContent='Создаём...'; }
  try {
    const r=await api('/topup/create',{amount:S.selAmt});
    document.getElementById('pg-topup').innerHTML=`
      <div style="padding:16px 16px 80px">
        <button class="back" onclick="goPage('wallet')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>Кошелёк</button>
        <div class="st">Оплата ${r.amount} ₽</div>
        <div style="background:var(--s2);border:1px solid var(--br);border-radius:20px;padding:20px">
          <div style="font-size:13px;color:var(--tx3);margin-bottom:8px">1️⃣ Открой DonationAlerts и задонать <b style="color:var(--gr2)">${r.amount} ₽</b></div>
          <a href="${r.da_link}" target="_blank" class="btn btn-pr" style="text-decoration:none;margin-bottom:16px">Открыть DonationAlerts →</a>
          <div style="font-size:13px;color:var(--tx3);margin-bottom:4px">2️⃣ В поле «Сообщение» вставь код:</div>
          <div class="pay-code" onclick="copyCode('${r.code}')">${r.code} 📋</div>
          <div style="font-size:12px;color:var(--gr2);font-weight:600;text-align:center;margin-top:12px">✅ Баланс пополнится автоматически за 15 сек</div>
        </div>
      </div>`;
    showFullPage('topup');
  } catch(e) {
    toast('❌ '+e.message);
    if (btn) { btn.disabled=false; btn.style.opacity='1'; btn.textContent=`Перейти к оплате ${S.selAmt} ₽ →`; }
  }
}

function copyCode(text) {
  navigator.clipboard?.writeText(text).then(()=>toast('✅ Скопировано!')).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=text; ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{document.execCommand('copy');toast('✅ Скопировано!');}catch(e){}
    document.body.removeChild(ta);
  });
}

function goWithdraw() {
  const bal=S.user?.balance??0;
  document.getElementById('pg-withdraw').innerHTML=`
    <div style="padding:16px 16px 80px">
      <button class="back" onclick="goPage('wallet')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>Кошелёк</button>
      <div class="st">Вывод в Telegram Stars</div>
      <div class="info-box">Комиссия: <b>5%</b> · Курс: <b>1.4 ₽ = 1 ⭐</b> · Мин. <b>100 ₽</b><br>⚠️ После указания @username не меняй его</div>
      <div class="field"><label>Сумма (₽)</label><input id="w-amt" type="number" inputmode="numeric" placeholder="Мин. 100 ₽" max="${bal}" oninput="updWdCalc()"></div>
      <div class="w-calc" id="w-calc" style="display:none">
        <div style="font-size:12px;color:var(--tx3);margin-bottom:4px">Вы получите</div>
        <div class="w-stars" id="w-stars">0 ⭐</div>
        <div style="font-size:12px;color:var(--tx3)" id="w-after"></div>
      </div>
      <div class="field"><label>Ваш @username</label><input id="w-user" placeholder="@username" oninput="if(!this.value.startsWith('@'))this.value='@'+this.value.replace('@','')"></div>
      <button class="btn btn-pr" onclick="doWithdraw()">💸 Вывести</button>
    </div>`;
  showFullPage('withdraw');
}

function updWdCalc() {
  const a=parseFloat(document.getElementById('w-amt')?.value||'0');
  const el=document.getElementById('w-calc'); if (!el) return;
  if (a>=100) {
    const after=a*(1-WD_C); const stars=Math.ceil(after/STAR_R);
    el.style.display='block';
    document.getElementById('w-stars').textContent=stars+' ⭐';
    document.getElementById('w-after').textContent=`${a.toFixed(0)} ₽ − 5% = ${after.toFixed(0)} ₽ → ${stars} звёзд`;
  } else el.style.display='none';
}

async function doWithdraw() {
  const amount=parseFloat(document.getElementById('w-amt')?.value||'0');
  const username=document.getElementById('w-user')?.value?.trim();
  const bal=S.user?.balance??0;
  if (!amount||amount<100) { toast('⚠️ Минимум 100 ₽'); return; }
  if (amount>bal) { toast(`❌ Баланс: ${bal.toFixed(0)} ₽`); return; }
  if (!username||!username.startsWith('@')) { toast('⚠️ Укажи @username'); return; }
  try {
    const r=await api('/withdraw',{amount,username});
    if (r.ok) { toast(`✅ Заявка! ${r.stars} ⭐`); if (S.user){S.user.balance-=amount;document.getElementById('hBal').textContent=S.user.balance.toFixed(0)+' ₽';} setTimeout(()=>goPage('wallet'),1000); }
  } catch(e) { toast('❌ '+e.message); }
}

// ── PROFILE ──────────────────────────────────────────────
async function renderProfile() {
  if (!uid()) { document.getElementById('pg-profile').innerHTML='<div class="empty"><div class="empty-i">🔐</div>Нужно открыть через Telegram</div>'; return; }
  document.getElementById('pg-profile').innerHTML='<div class="loader"><div class="spin"></div></div>';
  try {
    S.user=await api('/me');
    document.getElementById('hBal').textContent=S.user.balance.toFixed(0)+' ₽';
    const gl=S.user.gender==='male'?'👨 Мужской':S.user.gender==='female'?'👩 Женский':'';
    const sub=[S.user.age?S.user.age+' лет':'',gl].filter(Boolean).join(' · ')||'Профиль не заполнен';
    document.getElementById('pg-profile').innerHTML=`
      <div style="text-align:center;padding-top:10px">
        <div class="ava">👤</div>
        <div class="p-name">${esc(S.user.nickname||'Аноним')}</div>
        <div class="p-sub">${sub}</div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-v">${S.user.balance.toFixed(0)} ₽</div><div class="stat-l">Баланс</div></div>
        <div class="stat"><div class="stat-v">⭐ —</div><div class="stat-l">Рейтинг</div></div>
      </div>
      <button class="btn btn-pr" onclick="goEditProfile()">✏️ Редактировать профиль</button>
      <button class="btn btn-ol" onclick="goPage('wallet')">💰 Пополнить баланс</button>
      <button class="btn btn-ol" onclick="openSupport()">🆘 Поддержка</button>`;
  } catch(e) { document.getElementById('pg-profile').innerHTML=`<div class="empty"><div class="empty-i">⚠️</div>${e.message}</div>`; }
}

function goEditProfile() {
  const u=S.user||{}; S.gender=u.gender||'';
  document.getElementById('pg-editprofile').innerHTML=`
    <div style="padding:16px 16px 80px">
      <button class="back" onclick="goPage('profile')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>Профиль</button>
      <div class="st">Редактировать</div>
      <div class="field"><label>Никнейм</label><input id="ep-nick" value="${esc(u.nickname||'')}" placeholder="Твой ник" maxlength="30"></div>
      <div class="field"><label>Возраст</label><input id="ep-age" type="number" inputmode="numeric" value="${u.age||''}" placeholder="Лет?" min="1" max="120"></div>
      <div class="field"><label>Пол</label></div>
      <div class="g-row">
        <button class="g-btn ${S.gender==='male'?'sel':''}" id="g-male" onclick="selGender('male')">👨 Мужской</button>
        <button class="g-btn ${S.gender==='female'?'sel':''}" id="g-female" onclick="selGender('female')">👩 Женский</button>
      </div>
      <button class="btn btn-pr" onclick="saveProfile()">💾 Сохранить</button>
      <button class="btn btn-ol" onclick="goPage('profile')">Отмена</button>
    </div>`;
  showFullPage('editprofile');
}

function selGender(g) { S.gender=g; document.getElementById('g-male').classList.toggle('sel',g==='male'); document.getElementById('g-female').classList.toggle('sel',g==='female'); }

async function saveProfile() {
  const nick=document.getElementById('ep-nick')?.value?.trim();
  const age=parseInt(document.getElementById('ep-age')?.value||'0');
  if (!nick||nick.length>30) { toast('⚠️ Никнейм 1-30 символов'); return; }
  if (!age||age<1||age>120) { toast('⚠️ Укажи возраст'); return; }
  try { await api('/me/update',{nickname:nick,age,gender:S.gender||''}); toast('✅ Сохранено!'); if(S.user){S.user.nickname=nick;S.user.age=age;S.user.gender=S.gender;} goPage('profile'); }
  catch(e) { toast('❌ '+e.message); }
}

// ── SEARCH ───────────────────────────────────────────────
function goSearch() {
  showFullPage('search');
  document.getElementById('pg-search').innerHTML=`
    <div style="padding:16px 16px 80px">
      <button class="back" onclick="S.cat=null;goPage('market')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>Назад</button>
      <div class="field"><label>Поиск</label><input id="srch" placeholder="Название товара..." autofocus oninput="doSearch(this.value)"></div>
      <div id="srch-res"><div class="empty"><div class="empty-i">🔍</div>Начни вводить...</div></div>
    </div>`;
  setTimeout(()=>document.getElementById('srch')?.focus(),100);
}

let srchT=null;
async function doSearch(q) {
  clearTimeout(srchT); const el=document.getElementById('srch-res');
  if (!q||q.length<2) { if(el) el.innerHTML='<div class="empty"><div class="empty-i">🔍</div>Начни вводить...</div>'; return; }
  srchT=setTimeout(async()=>{
    if(el) el.innerHTML='<div class="loader"><div class="spin"></div></div>';
    try {
      let all=[];
      for (const c of ['signa','mugs','photos','videos']) { const p=await api('/products/'+c); all=all.concat(p); }
      const found=all.filter(p=>p.title.toLowerCase().includes(q.toLowerCase())||(p.description||'').toLowerCase().includes(q.toLowerCase()));
      if(el) el.innerHTML=found.length
        ?`<div class="prods">${found.map(p=>`<div class="prod" onclick="openProduct(${p.id})"><div class="prod-thumb">📦</div><div style="flex:1;min-width:0"><div class="prod-t">${esc(p.title)}</div><div class="prod-s">@${esc(p.seller_nick)}</div><div class="prod-p">${p.price} ₽</div></div></div>`).join('')}</div>`
        :'<div class="empty"><div class="empty-i">🔍</div>Ничего не найдено</div>';
    } catch(e) { if(el) el.innerHTML=`<div class="empty"><div class="empty-i">⚠️</div>${e.message}</div>`; }
  },400);
}

// ── UNREAD BADGE ─────────────────────────────────────────
let prevUnread=0;
async function checkUnread() {
  if (!uid()) return;
  try {
    const orders=await api('/orders');
    const total=orders.reduce((s,o)=>s+(o.unread||0),0);
    const badge=document.getElementById('badge-msgs');
    if (badge) { if(total>0){badge.textContent=total>9?'9+':total;badge.classList.add('on');}else badge.classList.remove('on'); }
    if (total>prevUnread&&S.page!=='chat'&&S.page!=='msgs') playSound();
    prevUnread=total;
  } catch(e) {}
}

// ── INIT ─────────────────────────────────────────────────
async function init() {
  renderMarket();
  if (uid()) {
    try { S.user=await api('/me'); document.getElementById('hBal').textContent=S.user.balance.toFixed(0)+' ₽'; } catch(e) {}
  }
  setInterval(async()=>{ if(!uid())return; try{S.user=await api('/me');document.getElementById('hBal').textContent=S.user.balance.toFixed(0)+' ₽';}catch(e){} },60000);
  setInterval(checkUnread,15000);
  checkUnread();
}
init();
</script>
</body>
</html>
