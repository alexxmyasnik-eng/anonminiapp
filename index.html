<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AnonPeak</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#08080f;--s1:#0f0f1a;--s2:#161625;--s3:#1e1e30;--br:#252538;--br2:#2f2f48;--ac:#7b5cf0;--ac2:#a78bfa;--gr:#10b981;--gr2:#34d399;--rd:#f43f5e;--yl:#f59e0b;--tx:#f1f0ff;--tx2:#a9a8c9;--tx3:#6b6a8a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
.hdr{position:sticky;top:0;z-index:50;background:rgba(8,8,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:10px 16px;gap:10px;height:57px}
.hdr-logo{font-family:'Unbounded',sans-serif;font-weight:800;font-size:17px;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-ico{background:none;border:none;color:var(--tx3);cursor:pointer;padding:6px;display:flex;align-items:center;border-radius:8px;margin-left:auto}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(8,8,15,.97);backdrop-filter:blur(20px);border-top:1px solid var(--br);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;background:none;border:none;color:var(--tx3);font-family:'Manrope',sans-serif;font-size:10px;cursor:pointer;transition:color .2s;position:relative}
.nb.on{color:var(--ac2)}
.nb svg{width:20px;height:20px}
.nb-badge{position:absolute;top:4px;right:calc(50% - 14px);background:var(--rd);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;display:none}
.nb-badge.on{display:block}
.pg{display:none;padding:16px 16px 80px}
.pg.on{display:block;animation:fu .18s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.fullpg{display:none;position:fixed;inset:0;z-index:60;background:var(--bg);flex-direction:column}
.fullpg.on{display:flex}
.st{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--tx3);margin:20px 0 10px}
.st:first-child{margin-top:0}
.back{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--ac2);font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;cursor:pointer;padding:0 0 14px}
.btn{width:100%;padding:15px;border-radius:16px;border:none;font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .12s;margin-bottom:10px;display:block;text-align:center}
.btn:last-child{margin-bottom:0}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-pr{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff}
.btn-gr{background:var(--gr);color:#fff}
.btn-ol{background:transparent;border:1.5px solid var(--br2);color:var(--tx)}
.btn-yl{background:var(--yl);color:#000}
.btn-rd{background:var(--rd);color:#fff}
/* MARKET */
.cats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat{background:var(--s2);border:1px solid var(--br);border-radius:16px;padding:20px 16px;cursor:pointer;text-align:center;transition:all .15s}
.cat:active{transform:scale(.96)}
.cat-i{font-size:30px;margin-bottom:8px}
.cat-n{font-size:13px;font-weight:600}
.prods{display:flex;flex-direction:column;gap:8px}
.prod{background:var(--s2);border:1px solid var(--br);border-radius:16px;padding:14px;cursor:pointer;display:flex;gap:12px;transition:all .12s;position:relative}
.prod.premium{border-color:var(--yl);background:linear-gradient(135deg,rgba(245,158,11,.05),var(--s2))}
.prod:active{transform:scale(.98)}
.prem-badge{position:absolute;top:10px;right:10px;background:var(--yl);color:#000;font-size:9px;font-weight:800;padding:2px 7px;border-radius:8px}
.prod-thumb{width:54px;height:54px;border-radius:12px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.prod-thumb img{width:100%;height:100%;object-fit:cover}
/* PROFILE */
.prof-header{text-align:center;padding:10px 0 16px}
.prof-ava{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 12px;overflow:hidden;position:relative}
.prof-ava img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.prof-ava-edit{position:absolute;bottom:0;right:0;width:26px;height:26px;background:var(--ac);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer}
.prof-name{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:700}
.prof-sub{color:var(--tx3);font-size:13px;margin:4px 0 0}
/* SETUP PROFILE */
.setup-card{background:var(--s2);border:1.5px solid var(--ac);border-radius:20px;padding:24px;text-align:center;margin-bottom:20px}
.setup-icon{font-size:48px;margin-bottom:12px}
.setup-title{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px}
.setup-desc{font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:20px}
/* WALLET */
.wal-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.wal-card{background:var(--s2);border:1px solid var(--br);border-radius:18px;padding:16px;position:relative}
.wal-card-label{font-size:11px;color:var(--tx3);font-weight:600;display:flex;align-items:center;gap:4px;margin-bottom:8px}
.wal-info-btn{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--tx3);display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;flex-shrink:0;background:none;color:var(--tx3)}
.wal-amount{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:800;color:var(--gr2)}
.wal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.wal-action{background:var(--s2);border:1px solid var(--br);border-radius:14px;padding:14px;cursor:pointer;text-align:center;transition:all .15s;font-weight:700;font-size:13px;font-family:'Manrope',sans-serif;color:var(--tx)}
.wal-action:active{transform:scale(.97)}
.wal-action.p{background:rgba(123,92,240,.15);border-color:var(--ac);color:var(--ac2)}
.wal-history{font-size:11px;color:var(--rd);font-weight:700;letter-spacing:.5px;text-transform:uppercase;text-align:center;padding:20px;background:var(--s2);border-radius:14px;border:1px dashed var(--br2)}
/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat{background:var(--s2);border:1px solid var(--br);border-radius:16px;padding:14px;text-align:center}
.stat-v{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:700;color:var(--ac2)}
.stat-l{font-size:11px;color:var(--tx3);margin-top:3px}
/* MSGS */
.conv-list{display:flex;flex-direction:column}
.conv-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--br);cursor:pointer;transition:all .12s}
.conv-item:active{opacity:.7}
.conv-ava{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.conv-ava img{width:100%;height:100%;object-fit:cover}
.conv-ava.sup{background:linear-gradient(135deg,#0ea5e9,#6366f1)}
.conv-ava.gc{background:linear-gradient(135deg,var(--gr),var(--ac))}
.conv-body{flex:1;min-width:0}
.conv-head{display:flex;justify-content:space-between;margin-bottom:3px}
.conv-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:65%}
.conv-time{font-size:11px;color:var(--tx3)}
.conv-preview{font-size:13px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-unread{background:var(--ac);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0;margin-left:6px}
/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.chat-hdr{background:var(--s2);border-bottom:1px solid var(--br);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-hdr-ava{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;overflow:hidden}
.chat-hdr-ava img{width:100%;height:100%;object-fit:cover}
.msgs-area{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:4px;padding-bottom:8px}
.msg-row{display:flex;flex-direction:column}
.msg-row.out{align-items:flex-end}
.msg-row.in{align-items:flex-start}
.msg-nick{font-size:11px;color:var(--ac2);margin-bottom:2px;padding:0 4px;cursor:pointer}
.msg-admin-label{font-size:11px;color:var(--yl);margin-bottom:2px;padding:0 4px}
.msg-bubble{max-width:80%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;cursor:pointer;position:relative}
.msg-bubble.out{background:linear-gradient(135deg,var(--ac),#5a3fd4);color:#fff;border-bottom-right-radius:4px}
.msg-bubble.in{background:var(--s3);color:var(--tx);border-bottom-left-radius:4px}
.msg-reply-preview{background:rgba(255,255,255,.1);border-left:2px solid rgba(255,255,255,.5);border-radius:6px;padding:4px 8px;margin-bottom:6px;font-size:11px;opacity:.8}
.msg-reply-preview.in-bubble{background:rgba(0,0,0,.15);border-left-color:var(--ac2)}
.msg-time{font-size:10px;opacity:.6;margin-top:3px;text-align:right}
.reply-bar{background:var(--s2);border-top:1px solid var(--br);padding:8px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.reply-bar-text{flex:1;font-size:12px;color:var(--tx2)}
.reply-bar-close{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:18px;padding:0}
.chat-input-bar{background:rgba(8,8,15,.97);backdrop-filter:blur(20px);border-top:1px solid var(--br);padding:10px 16px calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;flex-shrink:0}
.cinput{flex:1;background:var(--s3);border:1.5px solid var(--br);border-radius:24px;padding:10px 16px;color:var(--tx);font-family:'Manrope',sans-serif;font-size:14px;outline:none}
.cinput:focus{border-color:var(--ac)}
.csend{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.csend:active{transform:scale(.9)}
/* ORDER CARD */
.ord-card-chat{background:var(--s2);border:1px solid var(--br);border-radius:14px;padding:14px;margin:8px 0}
/* FORM */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--tx3);font-weight:700;margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
.field input,.field textarea,.field select{width:100%;background:var(--s2);border:1.5px solid var(--br);border-radius:12px;padding:12px 14px;color:var(--tx);font-family:'Manrope',sans-serif;font-size:14px;outline:none;-webkit-appearance:none;transition:border-color .2s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--ac)}
.field textarea{resize:none;height:80px}
.field select option{background:var(--s2)}
/* SELL TYPE */
.sell-type-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.sell-type-card{background:var(--s2);border:2px solid var(--br);border-radius:18px;padding:18px 14px;cursor:pointer;text-align:center;transition:all .15s}
.sell-type-card:active{transform:scale(.97)}
.sell-type-card.on{border-color:var(--ac)}
.sell-type-card.on.prem{border-color:var(--yl)}
/* WALLET TOPUP */
.amts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.amt-btn{background:var(--s2);border:1.5px solid var(--br);border-radius:12px;padding:13px 4px;font-size:13px;font-weight:700;color:var(--tx);cursor:pointer;transition:all .12s;font-family:'Manrope',sans-serif}
.amt-btn.sel{border-color:var(--ac);color:var(--ac2);background:rgba(123,92,240,.15)}
.custom-row{display:flex;gap:8px;margin-bottom:14px}
.cinp-sm{flex:1;background:var(--s2);border:1.5px solid var(--br);border-radius:12px;padding:12px 14px;color:var(--tx);font-family:'Manrope',sans-serif;font-size:15px;outline:none;-webkit-appearance:none}
.cinp-sm:focus{border-color:var(--ac)}
.pay-code{background:var(--s1);border:2px solid var(--gr);border-radius:12px;padding:16px;text-align:center;cursor:pointer;margin:12px 0;font-size:18px;font-weight:800;color:var(--gr2);letter-spacing:2px;font-family:'Unbounded',sans-serif}
.g-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.g-btn{background:var(--s2);border:1.5px solid var(--br);border-radius:12px;padding:12px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;color:var(--tx3);cursor:pointer;text-align:center;transition:all .15s}
.g-btn.sel{border-color:var(--ac);color:var(--ac2);background:rgba(123,92,240,.1)}
.info-box{background:var(--s2);border:1px solid var(--br);border-radius:14px;padding:14px;margin-bottom:14px;font-size:13px;color:var(--tx2);line-height:1.7}
.w-calc{background:linear-gradient(135deg,#0a1525,#140e2a);border:1px solid #2a1f50;border-radius:16px;padding:16px;margin-bottom:14px;text-align:center}
.w-stars{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:800;color:var(--yl);margin:8px 0}
.hr{height:1px;background:var(--br);margin:16px 0}
/* POPUP */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;padding:0}
.popup-box{background:var(--s2);border:1px solid var(--br2);border-radius:24px 24px 0 0;padding:28px 24px calc(28px + env(safe-area-inset-bottom));width:100%;text-align:center;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.popup-title{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;margin-bottom:10px}
.popup-text{font-size:13px;color:var(--tx2);line-height:1.7;margin-bottom:20px}
/* CTX */
.ctx-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.4)}
.ctx-sheet{position:fixed;bottom:0;left:0;right:0;z-index:301;background:var(--s2);border-radius:20px 20px 0 0;padding:16px 8px calc(16px + env(safe-area-inset-bottom));animation:slideUp .2s ease}
.ctx-btn{display:flex;align-items:center;gap:12px;width:100%;background:none;border:none;color:var(--tx);font-family:'Manrope',sans-serif;font-size:15px;padding:14px 16px;cursor:pointer;border-radius:12px;text-align:left}
.ctx-btn:active{background:var(--s3)}
.ctx-btn.danger{color:var(--rd)}
.ctx-btn .ctx-icon{font-size:20px;width:24px;text-align:center}
.ctx-divider{height:1px;background:var(--br);margin:4px 8px}
/* TOAST */
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--s3);border:1px solid var(--br2);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;max-width:85vw;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.loader{text-align:center;padding:50px;color:var(--tx3)}
.spin{width:30px;height:30px;border-radius:50%;border:2.5px solid var(--br2);border-top-color:var(--ac);animation:sp .7s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px 20px;color:var(--tx3)}
.empty-i{font-size:40px;margin-bottom:10px}
.friends-badge{background:var(--gr);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:6px}
/* SUBCATEGORY TABS */
.subs-wrap{display:flex;gap:8px;overflow-x:auto;padding:0 0 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch;margin-bottom:4px}
.subs-wrap::-webkit-scrollbar{display:none}
.sub-tab{flex-shrink:0;background:var(--s2);border:1.5px solid var(--br);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--tx3);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Manrope',sans-serif}
.sub-tab:active{transform:scale(.95)}
.sub-tab.on{background:rgba(123,92,240,.18);border-color:var(--ac);color:var(--ac2)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">ANONPEAK</div>
  <button class="hdr-ico" onclick="goSearch()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
  <!-- Settings gear — only on profile tab -->
  <button class="hdr-ico" id="hdr-gear" style="display:none" onclick="goSettings()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
</div>
<div class="toast" id="toast"></div>

<div class="pg on" id="pg-market"></div>
<div class="pg" id="pg-sell"></div>
<div class="pg" id="pg-msgs"></div>
<div class="pg" id="pg-wallet"></div>
<div class="pg" id="pg-profile"></div>

<div class="fullpg" id="fp-chat"><div class="chat-wrap" id="chat-inner"></div></div>
<div class="fullpg" id="fp-product" style="overflow-y:auto"><div id="product-inner" style="padding:16px 16px 80px"></div></div>
<div class="fullpg" id="fp-settings" style="overflow-y:auto"><div id="settings-inner" style="padding:16px 16px 80px"></div></div>
<div class="fullpg" id="fp-userprofile" style="overflow-y:auto"><div id="userprofile-inner" style="padding:16px 16px 80px"></div></div>
<div class="fullpg" id="fp-topup" style="overflow-y:auto"><div id="topup-inner" style="padding:16px 16px 80px"></div></div>
<div class="fullpg" id="fp-withdraw" style="overflow-y:auto"><div id="withdraw-inner" style="padding:16px 16px 80px"></div></div>
<div class="fullpg" id="fp-search" style="overflow-y:auto"><div id="search-inner" style="padding:16px 16px 80px"></div></div>
<div class="fullpg" id="fp-selltype" style="overflow-y:auto"><div id="selltype-inner" style="padding:16px 16px 80px"></div></div>
<div class="fullpg" id="fp-friends" style="overflow-y:auto"><div id="friends-inner" style="padding:16px 16px 80px"></div></div>
<div class="fullpg" id="fp-adminsup" style="overflow-y:auto"><div id="adminsup-inner" style="padding:16px 16px 80px"></div></div>

<nav class="nav">
  <button class="nb on" id="nb-market" onclick="goPage('market')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Маркет</button>
  <button class="nb" id="nb-sell" onclick="goPage('sell')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Продать</button>

<audio id="snd" preload="auto"><source src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

<script>
const API='https://anonpeak-production.up.railway.app';
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}
const S={page:'market',user:null,cat:null,sub:null,chatInterval:null,gcInterval:null,supInterval:null,gender:'',selAmt:0,sellData:null,replyTo:null};
const esc=s=>s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';
const uid=()=>tg?.initDataUnsafe?.user?.id||null;
const SELL_C=0.16,WD_C=0.05,STAR_R=1.4,PREM_P=9,MIN_WD=100;
let blockedUsers=[],mutedUsers=[],sellTypeSelected='normal';
try{blockedUsers=JSON.parse(localStorage.getItem('blocked')||'[]');}catch(e){}
try{mutedUsers=JSON.parse(localStorage.getItem('muted')||'[]');}catch(e){}

function playSound(){try{if(!mutedUsers.includes('all'))document.getElementById('snd')?.play();}catch(e){}}
function toast(msg,ms=2500){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),ms);}

async function api(path,body=null){
  const u=uid();const params=new URLSearchParams();
  if(u)params.set('uid',String(u));
  if(body)for(const[k,v]of Object.entries(body))if(v!==null&&v!==undefined)params.set(k,String(v));
  const url=API+path+(params.toString()?'?'+params.toString():'');
  try{const r=await fetch(url);if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||'HTTP '+r.status);}return r.json();}
  catch(e){throw new Error(e.message||'Ошибка');}
}

// POST for avatar (binary data)
async function apiPostAvatar(dataUrl){
  const u=uid();if(!u)throw new Error('Нет uid');
  const r=await fetch(`${API}/me/set_avatar?uid=${u}`,{method:'POST',body:dataUrl,headers:{'Content-Type':'text/plain'}});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||'Error');}
  return r.json();
}

// ── POPUP ─────────────────────────────────────────────────
function showPopup(title,text){
  const el=document.createElement('div');el.className='popup-overlay';
  el.innerHTML=`<div class="popup-box"><div class="popup-title">${esc(title)}</div><div class="popup-text">${text}</div><button class="btn btn-pr" onclick="this.closest('.popup-overlay').remove()">Понятно</button></div>`;
  el.addEventListener('click',e=>{if(e.target===el)el.remove();});
  document.body.appendChild(el);
}

// ── CTX SHEET ─────────────────────────────────────────────
function showCtxSheet(items){
  const ov=document.createElement('div');ov.className='ctx-overlay';
  const sh=document.createElement('div');sh.className='ctx-sheet';
  sh.innerHTML=items.map((it,i)=>it==='---'?'<div class="ctx-divider"></div>':`<button class="ctx-btn${it.danger?' danger':''}" data-i="${i}"><span class="ctx-icon">${it.icon||''}</span>${esc(it.label)}</button>`).join('');
  sh.querySelectorAll('.ctx-btn').forEach(btn=>{
    btn.onclick=()=>{const i=parseInt(btn.dataset.i);if(items[i]?.fn)items[i].fn();ov.remove();sh.remove();};
  });
  ov.onclick=()=>{ov.remove();sh.remove();};
  document.body.appendChild(ov);document.body.appendChild(sh);
}

// ── NAV ───────────────────────────────────────────────────
function closeAllFull(){document.querySelectorAll('.fullpg').forEach(p=>p.classList.remove('on'));}
function goPage(name){
  if(S.chatInterval){clearInterval(S.chatInterval);S.chatInterval=null;}
  if(S.gcInterval){clearInterval(S.gcInterval);S.gcInterval=null;}
  if(S.supInterval){clearInterval(S.supInterval);S.supInterval=null;}
  closeAllFull();
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+name)?.classList.add('on');
  document.getElementById('nb-'+name)?.classList.add('on');
  document.getElementById('hdr-gear').style.display=name==='profile'?'flex':'none';
  S.page=name;
  ({market:renderMarket,sell:renderSell,msgs:renderMsgs,wallet:renderWallet,profile:renderProfile}[name]||function(){})();
}
function showFull(id){
  closeAllFull();
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById('fp-'+id)?.classList.add('on');
  S.page=id;
}
function backTo(name){closeAllFull();goPage(name);}

// ── CATEGORIES (sync with api.py CATEGORIES) ─────────────
const CATEGORIES={
  photos:{name:'📸 Фото',subs:['Все','Соло','Игрушки','Тематика']},
  videos:{name:'🎬 Видео',subs:['Все','Мастурбация','Кастом','Анальное']},
  domination:{name:'⛓️ Доминация',subs:['Все','Оценка','Задания','Контроль','Унижение']},
  slaves:{name:'🧎‍♀️ Рабыня',subs:['Все','Повиновение','Отчеты']},
  audio:{name:'🎧 Аудио',subs:['Все','Секстинг','Стоны','Унижение']},
  signa:{name:'🖊 Сигны',subs:['Все','На теле','Видео-сигна']}
};

// ── MARKET ────────────────────────────────────────────────
function renderMarket(){
  if(S.cat){renderProducts(S.cat,S.sub||'Все');return;}
  const entries=Object.entries(CATEGORIES);
  document.getElementById('pg-market').innerHTML=`
    <div class="st">Категории</div>
    <div class="cats">
      ${entries.map(([id,c])=>{
        const emoji=c.name.match(/^\S+/)?.[0]||'';
        const label=c.name.replace(/^\S+\s*/,'');
        return`<div class="cat" onclick="openCat('${id}')"><div class="cat-i">${emoji}</div><div class="cat-n">${label}</div></div>`;
      }).join('')}
    </div>`;
}
async function openCat(c){S.cat=c;S.sub='Все';await renderProducts(c,'Все');}
async function renderProducts(catId,activeSub='Все'){
  S.sub=activeSub;
  const cat=CATEGORIES[catId]||{name:catId,subs:['Все']};
  const el=document.getElementById('pg-market');
  const subsHtml=`<div class="subs-wrap">${cat.subs.map(s=>`<button class="sub-tab${s===activeSub?' on':''}" onclick="renderProducts('${catId}','${s}')">${s}</button>`).join('')}</div>`;
  el.innerHTML=`<button class="back" onclick="S.cat=null;S.sub=null;renderMarket()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>${cat.name}</button>${subsHtml}<div class="loader"><div class="spin"></div></div>`;
  try{
    const apiSub=activeSub==='Все'?null:activeSub;
    const prods=await api('/products/'+catId+(apiSub?'?sub='+encodeURIComponent(apiSub):''));
    el.querySelector('.loader').outerHTML=prods.length
      ?`<div class="prods">${prods.map(p=>`
        <div class="prod${p.is_premium?' premium':''}" onclick="openProduct(${p.id})">
          ${p.is_premium?'<div class="prem-badge">⭐ ТОП</div>':''}
          <div class="prod-thumb">📦</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:14px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.title)}</div>
            <div style="font-size:11px;color:var(--tx3);margin-bottom:4px">@${esc(p.seller_nick)} · ⭐${p.seller_rating}</div>
            <div style="font-weight:700;font-size:15px;color:var(--gr2)">${p.price} ₽</div>
          </div>
        </div>`).join('')}</div>`
      :'<div class="empty"><div class="empty-i">📭</div>Товаров пока нет</div>';
  }catch(e){el.querySelector('.loader').outerHTML=`<div class="empty"><div class="empty-i">⚠️</div>${e.message}</div>`;}
}
async function openProduct(id){
  document.getElementById('product-inner').innerHTML='<div class="loader"><div class="spin"></div></div>';
  showFull('product');
  try{
    const p=await api('/product/'+id);const isMine=uid()&&p.seller_id===uid();
    document.getElementById('product-inner').innerHTML=`
      <button class="back" onclick="backTo('market')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>Назад</button>
      <div style="width:100%;aspect-ratio:1;border-radius:20px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:64px;margin-bottom:16px">📦</div>
      <div style="font-family:'Unbounded',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px">${esc(p.title)}</div>
      <div style="color:var(--tx3);font-size:13px;margin-bottom:8px;cursor:pointer" onclick="openUserProfile(${p.seller_id})">👤 ${esc(p.seller_nick)} · ⭐${p.seller_rating} (${p.seller_reviews} отзывов) →</div>
      <div style="color:var(--tx2);font-size:14px;line-height:1.6;margin-bottom:16px">${esc(p.description||'Без описания')}</div>
      <div style="font-family:'Unbounded',sans-serif;font-size:28px;font-weight:800;color:var(--gr2);margin-bottom:20px">${p.price} ₽</div>
      ${isMine?`<div class="btn btn-ol" style="cursor:default">Это ваш товар</div>`:`<button class="btn btn-pr" onclick="doBuy(${p.id},${p.price})">🛒 Купить — ${p.price} ₽</button>`}`;
  }catch(e){document.getElementById('product-inner').innerHTML=`<div class="empty"><div class="empty-i">⚠️</div>${e.message}</div>`;}
}
async function doBuy(id,price){
  if(!uid()){toast('⚠️ Нужен Telegram');return;}
  if((S.user?.balance??0)<price){toast('❌ Недостаточно средств');setTimeout(()=>goPage('wallet'),800);return;}
  try{
    const r=await api('/buy',{product_id:id});
    if(r.ok){playSound();toast('✅ Куплено! '+r.short_id);if(S.user){S.user.balance-=price;}setTimeout(()=>goPage('msgs'),1000);}
    else{toast('❌ Недостаточно средств');setTimeout(()=>goPage('wallet'),800);}
  }catch(e){toast('❌ '+e.message);}
}

// ── USER PROFILE PAGE ─────────────────────────────────────
async function openUserProfile(userId){
  document.getElementById('userprofile-inner').innerHTML='<div class="loader"><div class="spin"></div></div>';
  showFull('userprofile');
  try{
    const[u,fs]=await Promise.all([api('/user/'+userId),S.user?api('/friends/status',{other_id:userId}):Promise.resolve({status:'none'})]);
    const gl=u.gender==='male'?'👨 Мужской':u.gender==='female'?'👩 Женский':'';
    const sub=[u.age?u.age+' лет':'',gl].filter(Boolean).join(' · ')||'';
    const fStatus=fs.status;
    let friendBtn='';
    if(userId!==uid()){
      if(fStatus==='accepted') friendBtn=`<button class="btn btn-ol">✅ В друзьях</button>`;
      else if(fStatus==='pending') friendBtn=`<button class="btn btn-ol" disabled>⏳ Заявка отправлена</button>`;
      else friendBtn=`<button class="btn btn-pr" onclick="addFriend(${userId})">➕ Добавить в друзья</button>`;
    }
    document.getElementById('userprofile-inner').innerHTML=`
      <button class="back" onclick="closeAllFull()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>Назад</button>
      <div class="prof-header">
        <div class="prof-ava">${u.avatar_url&&!u.avatar_url.startsWith('http')?`<img src="${u.avatar_url}">`:(u.avatar_url?`<img src="${esc(u.avatar_url)}">`:'👤')}</div>
        <div class="prof-name">${esc(u.nickname)}</div>
        ${sub?`<div class="prof-sub">${sub}</div>`:''}
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-v">⭐ ${u.rating}</div><div class="stat-l">Рейтинг</div></div>
        <div class="stat"><div class="stat-v">${u.reviews}</div><div class="stat-l">Отзывов</div></div>
      </div>
      ${friendBtn}`;
  }catch(e){document.getElementById('userprofile-inner').innerHTML=`<div class="empty"><div class="empty-i">⚠️</div>${e.message}</div>`;}
}
async function addFriend(friendId){
  try{await api('/friends/add',{friend_id:friendId});toast('✅ Заявка отправлена!');openUserProfile(friendId);}
  catch(e){toast('❌ '+e.message);}
}

// ── FRIENDS PAGE ──────────────────────────────────────────
async function openFriends(){
  document.getElementById('friends-inner').innerHTML='<div class="loader"><div class="spin"></div></div>';
  showFull('friends');
  try{
    const[friends,requests,unreadMap]=await Promise.all([
      api('/friends/list'),
      api('/friends/requests'),
      api('/dm/unread_count').catch(()=>({}))
    ]);
    let html=`<button class="back" onclick="backTo('profile')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>Профиль</button>`;
    if(requests.length){
      html+=`<div class="st">Заявки в друзья</div>`;
      html+=requests.map(r=>`<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--br)">
        <div class="conv-ava">👤</div>
        <div style="flex:1"><div style="font-weight:700">${esc(r.nickname)}</div></div>
        <button class="btn btn-gr" style="width:auto;padding:8px 14px;margin:0;font-size:13px" onclick="acceptFriend(${r.user_id})">Принять</button>
      </div>`).join('');
    }
    html+=`<div class="st">Друзья</div>`;
    const accepted=friends.filter(f=>f.status==='accepted');
    if(accepted.length){
      html+=accepted.map(f=>{
        const unread=unreadMap[String(f.friend_id)]||0;
        return`<div class="conv-item" style="justify-content:space-between">
          <div style="display:flex;align-items:center;gap:12px;flex:1" onclick="openUserProfile(${f.friend_id})">
            <div class="conv-ava">👤</div>
            <div class="conv-body"><div class="conv-name">${esc(f.nickname)}</div><div class="conv-preview">Нажми чтобы написать →</div></div>
          </div>
          <button onclick="openDmChat(${f.friend_id},'${f.nickname?.replace(/'/g,"\'")}','')" style="background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;border-radius:12px;padding:10px 14px;color:#fff;font-family:Manrope,sans-serif;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;position:relative">
            💬${unread>0?`<span style="position:absolute;top:-4px;right:-4px;background:var(--rd);color:#fff;font-size:9px;font-weight:700;padding:1px 4px;border-radius:8px">${unread}</span>`:''}
          </button>
        </div>`;
      }).join('');
    }else html+='<div class="empty" style="padding:20px"><div class="empty-i">👥</div>Друзей пока нет</div>';
    document.getElementById('friends-inner').innerHTML=html;
  }catch(e){document.getElementById('friends-inner').innerHTML=`<div class="empty"><div class="empty-i">⚠️</div>${e.message}</div>`;}
}
async function acceptFriend(friendId){
  try{await api('/friends/accept',{friend_id:friendId});toast('✅ Теперь вы друзья!');openFriends();}
  catch(e){toast('❌ '+e.message);}
}

// ── SELL ─────────────────────────────────────────────────
function renderSell(){
  if(!uid()){document.getElementById('pg-sell').innerHTML='<div class="empty"><div class="empty-i">🔐</div>Нужно открыть через Telegram</div>';return;}
  S.sellData=null;sellTypeSelected='normal';
  document.getElementById('pg-sell').innerHTML=`
    <div class="st">Новый товар</div>
    <div class="field"><label>Название</label><input id="s-title" placeholder="Что продаёшь?" maxlength="100"></div>
    <div class="field"><label>Описание</label><textarea id="s-desc" placeholder="Подробнее..."></textarea></div>
    <div class="field"><label>Цена (₽)</label><input id="s-price" type="number" inputmode="numeric" placeholder="Мин. 15 ₽"></div>
    <div class="field"><label>Категория</label>
      <select id="s-cat">
        <option value="">Выбери категорию</option>
        <option value="signa">🖊 Сигна</option>
        <option value="mugs">☕ Кружки</option>
        <option value="photos">📸 Фото</option>
        <option value="videos">🎬 Видео</option>
      </select>
    </div>
    <button class="btn btn-pr" onclick="goSellType()">Далее →</button>`;
}
function goSellType(){
  const title=document.getElementById('s-title')?.value?.trim();
  const desc=document.getElementById('s-desc')?.value?.trim();
  const price=parseFloat(document.getElementById('s-price')?.value||'0');
  const cat=document.getElementById('s-cat')?.value;
  if(!title){toast('⚠️ Введи название');return;}
  if(!price||price<15){toast('⚠️ Мин. цена 15 ₽');return;}
  if(!cat){toast('⚠️ Выбери категорию');return;}
  S.sellData={title,desc:desc||'',price,cat};
  document.getElementById('selltype-inner').innerHTML=`
    <button class="back" onclick="backTo('sell')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>Назад</button>
    <div class="st">Тип размещения</div>
    <div class="sell-type-wrap">
      <div class="sell-type-card on" id="stype-n" onclick="selSellType('normal')">
        <div style="font-size:28px;margin-bottom:8px">📦</div>
        <div style="font-weight:700;font-size:14px;margin-bottom:4px">Обычный</div>
        <div style="font-size:11px;color:var(--tx3);line-height:1.5">Показывается среди других. Новые — выше старых.</div>
        <div style="font-size:12px;font-weight:700;margin-top:8px;color:var(--gr2)">Бесплатно</div>
      </div>
      <div class="sell-type-card prem" id="stype-p" onclick="selSellType('prem')">
        <div style="font-size:28px;margin-bottom:8px">⭐</div>
        <div style="font-weight:700;font-size:14px;margin-bottom:4px">Премиум</div>
        <div style="font-size:11px;color:var(--tx3);line-height:1.5">Всегда выше обычных. Больше просмотров и продаж.</div>
        <div style="font-size:12px;font-weight:700;margin-top:8px;color:var(--yl)">−${PREM_P} ₽ с баланса</div>
      </div>
    </div>
    <button class="btn btn-pr" onclick="doSell()">📦 Опубликовать</button>`;
  showFull('selltype');
}
function selSellType(t){
  sellTypeSelected=t;
  document.getElementById('stype-n').classList.toggle('on',t==='normal');
  document.getElementById('stype-p').classList.toggle('on',t==='prem');
}
let sellPublishing=false;
async function doSell(){
  if(sellPublishing)return;
  if(!S.sellData){toast('⚠️ Заполни форму');backTo('sell');return;}
  const isPrem=sellTypeSelected==='prem';
  if(isPrem&&(S.user?.balance??0)<PREM_P){toast(`❌ Нужно ${PREM_P} ₽ для премиум`);setTimeout(()=>goPage('wallet'),800);return;}
  sellPublishing=true;
  const btn=document.querySelector('#fp-selltype .btn-pr');
  if(btn){btn.disabled=true;btn.textContent='Публикуем...';}
  try{
    const r=await api('/products/create',{title:S.sellData.title,description:S.sellData.desc,price:S.sellData.price,category:S.sellData.cat,is_premium:isPrem});
    if(r.ok){toast('✅ Опубликовано!');if(isPrem&&S.user)S.user.balance-=PREM_P;S.sellData=null;sellTypeSelected='normal';setTimeout(()=>goPage('market'),800);}
  }catch(e){
    toast('❌ '+e.message);
    if(btn){btn.disabled=false;btn.textContent='📦 Опубликовать';}
  }finally{sellPublishing=false;}
}

// ── MSGS ─────────────────────────────────────────────────
let msgsInterval=null;
async function renderMsgs(){
  if(!uid()){document.getElementById('pg-msgs').innerHTML='<div class="empty"><div class="empty-i">🔐</div>Нужно открыть через Telegram</div>';return;}
  document.getElementById('pg-msgs').innerHTML='<div class="loader"><div class="spin"></div></div>';
  await loadMsgsList();
  if(msgsInterval)clearInterval(msgsInterval);
  msgsInterval=setInterval(()=>{if(S.page==='msgs')loadMsgsList();else clearInterval(msgsInterval);},10000);
}
async function loadMsgsList(){
  try{
    const[orders,gcMsgs]=await Promise.all([api('/orders'),api('/chat/messages')]);
    const myId=uid();let total=0;orders.forEach(o=>total+=(o.unread||0));
    const lastGc=gcMsgs.length?gcMsgs[gcMsgs.length-1]:null;
    // Admin gets support panel too
    const isAdmin=myId==780434845;
    document.getElementById('pg-msgs').innerHTML=`
      <div class="st" style="margin-top:0">Сообщения</div>
      <div class="conv-list">

function renderMsgsList(msgs,myId,type,contextId){

  return msgs.map(m=>{

    return`<div class="msg-row ${isOut?'out':'in'}">
      <div class="msg-bubble ${isOut?'out':'in'}" onclick="onMsgTap(event,${m.id},'${esc(m.text?.slice(0,50)?.replace(/'/g,"\\'")||'')}',${isOut},'${type}',${contextId})">
        ${replyHtml}${esc(m.text||'📎')}
        <div class="msg-time">${(m.created_at||'').slice(11,16)}</div>
      </div>
    </div>`;
  }).join('');
}

function onMsgTap(e,msgId,msgText,isOut,type,contextId){
  const items=[

  ];

  showCtxSheet(items);
}

function setReply(msgId,text){

async function refreshOrderMsgs(orderId){

function buildGcHtml(msgs,myId){
  if(!msgs.length)return'<div style="text-align:center;color:var(--tx3);font-size:13px;padding:20px">Будь первым 👋</div>';
  return msgs.filter(m=>!blockedUsers.includes(m.user_id)).map(m=>{
    const isOut=m.user_id===myId;
    return`<div class="msg-row ${isOut?'out':'in'}">
      ${!isOut?`<div class="msg-nick" onclick="openUserProfile(${m.user_id})">${esc(m.nickname)}</div>`:''}
      <div class="msg-bubble ${isOut?'out':'in'}" onclick="gcMsgTap(${m.id},${m.user_id},'${esc(m.nickname?.replace(/'/g,"\\'"))}',${isOut})">${esc(m.message)}<div class="msg-time">${(m.created_at||'').slice(11,16)}</div></div>
    </div>`;
  }).join('');
}
async function refreshGlobalChat(){
  if(S.page!=='chat'){clearInterval(S.gcInterval);S.gcInterval=null;return;}
  try{
    const msgs=await api('/chat/messages');const myId=uid();
    const el=document.getElementById('gcmsgs');if(!el)return;
    const atBot=el.scrollHeight-el.scrollTop-el.offsetHeight<80;
    if(msgs.length>gcPrev)playSound();gcPrev=msgs.length;
    el.innerHTML=buildGcHtml(msgs,myId);
    if(atBot)scrollChat('gcmsgs');
  }catch(e){}
}
async function gcSend(){
  const inp=document.getElementById('gc-inp');const text=inp?.value?.trim();
  if(!text)return;inp.value='';
  try{await api('/chat/send',{message:text});await refreshGlobalChat();scrollChat('gcmsgs');}
  catch(e){toast('❌ '+e.message);}
}
function gcMsgTap(msgId,userId,nick,isOut){
  const isBlocked=blockedUsers.includes(userId);
  const isMuted=mutedUsers.includes(userId);
  const items=[
    {icon:'👤',label:'Профиль '+nick,fn:()=>openUserProfile(userId)},
    {icon:'➕',label:'Добавить в друзья',fn:()=>addFriend(userId)},
    '---',
  ];
  if(isOut)items.push({icon:'🗑',label:'Удалить',danger:true,fn:()=>gcDelete(msgId)});
  if(!isOut){
    items.push({icon:isMuted?'🔔':'🔇',label:isMuted?'Включить уведомления':'Замутить',fn:()=>toggleMute(userId,nick)});
    items.push({icon:isBlocked?'✅':'🚫',label:isBlocked?'Разблокировать':'Заблокировать',danger:!isBlocked,fn:()=>isBlocked?gcUnblock(userId,nick):gcBlock(userId,nick)});
  }
  showCtxSheet(items);
}
async function gcDelete(msgId){try{await api('/chat/delete',{msg_id:msgId});await refreshGlobalChat();}catch(e){toast('❌ '+e.message);}}
function gcBlock(u,n){if(!blockedUsers.includes(u)){blockedUsers.push(u);try{localStorage.setItem('blocked',JSON.stringify(blockedUsers));}catch(e){}toast('🚫 '+n+' заблокирован');refreshGlobalChat();}}
function gcUnblock(u,n){blockedUsers=blockedUsers.filter(id=>id!==u);try{localStorage.setItem('blocked',JSON.stringify(blockedUsers));}catch(e){}toast('✅ '+n+' разблокирован');refreshGlobalChat();}
function toggleMute(u,n){
  if(mutedUsers.includes(u)){mutedUsers=mutedUsers.filter(id=>id!==u);toast('🔔 Уведомления включены');}
  else{mutedUsers.push(u);toast('🔇 '+n+' замучен');}
  try{localStorage.setItem('muted',JSON.stringify(mutedUsers));}catch(e){}
}

function updWd(){
  const a=parseFloat(document.getElementById('w-amt')?.value||'0');const el=document.getElementById('w-calc');if(!el)return;
  if(a>=100){const after=a*(1-WD_C);const stars=Math.ceil(after/STAR_R);el.style.display='block';document.getElementById('w-stars').textContent=stars+' ⭐';document.getElementById('w-after').textContent=`${a.toFixed(0)} ₽ − 5% = ${after.toFixed(0)} ₽ → ${stars} звёзд`;}
  else el.style.display='none';
}
async function doWithdraw(){
  const amount=parseFloat(document.getElementById('w-amt')?.value||'0');const username=document.getElementById('w-user')?.value?.trim();
  const earn=S.user?.earn_balance??0;
  if(!amount||amount<100){toast('⚠️ Минимум 100 ₽');return;}
  if(amount>earn){toast(`❌ Доступно: ${earn.toFixed(0)} ₽`);return;}
  if(!username||!username.startsWith('@')){toast('⚠️ Укажи @username');return;}
  try{const r=await api('/withdraw',{amount,username});if(r.ok){toast(`✅ Заявка! ${r.stars} ⭐`);if(S.user){S.user.earn_balance-=amount;S.user.balance-=amount;}setTimeout(()=>backTo('wallet'),1000);}}
  catch(e){toast('❌ '+e.message);}
}

function pickAvatar(){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=(e)=>{
    const file=e.target.files[0];if(!file)return;
    if(file.size>2*1024*1024){toast('⚠️ Файл слишком большой (макс 2MB)');return;}
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      const dataUrl=ev.target.result;
      try{
        await apiPostAvatar(dataUrl);
        if(S.user)S.user.avatar_url=dataUrl;
        const ava=document.querySelector('#pg-profile .prof-ava');
        if(ava)ava.innerHTML=`<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"><div class="prof-ava-edit" onclick="pickAvatar()">📷</div>`;
        toast('✅ Аватарка обновлена!');
      }catch(err){toast('❌ '+err.message);}
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';

let srchT=null;
async function doSearch(q){
  clearTimeout(srchT);const el=document.getElementById('srch-res');
  if(!q||q.length<2){if(el)el.innerHTML='<div class="empty"><div class="empty-i">🔍</div>Начни вводить...</div>';return;}
  srchT=setTimeout(async()=>{
    if(el)el.innerHTML='<div class="loader"><div class="spin"></div></div>';
    try{
      let all=[];for(const c of['signa','mugs','photos','videos']){const p=await api('/products/'+c);all=all.concat(p);}
      const found=all.filter(p=>p.title.toLowerCase().includes(q.toLowerCase())||(p.description||'').toLowerCase().includes(q.toLowerCase()));
      if(el)el.innerHTML=found.length
        ?`<div class="prods">${found.map(p=>`<div class="prod" onclick="openProduct(${p.id})"><div class="prod-thumb">📦</div><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14px;margin-bottom:3px">${esc(p.title)}</div><div style="font-size:11px;color:var(--tx3)">${esc(p.seller_nick)}</div><div style="font-weight:700;font-size:14px;color:var(--gr2)">${p.price} ₽</div></div></div>`).join('')}</div>`
        :'<div class="empty"><div class="empty-i">🔍</div>Ничего не найдено</div>';
    }catch(e){if(el)el.innerHTML=`<div class="empty"><div class="empty-i">⚠️</div>${e.message}</div>`;}
  },400);
}

let dmInterval=null;

async function buildDmChat(friendId, friendNick, friendAvatar){

    </div>
    <div class="chat-input-bar">
      <input class="cinput" id="dm-inp" placeholder="Сообщение..." onkeydown="if(event.key==='Enter')dmSend(${friendId})">
      <button class="csend" onclick="dmSend(${friendId})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </div>`;
  scrollChat('dmmsgs');
  // Remove unread badge
  if(dmUnread[friendId]){delete dmUnread[friendId];updateDmBadges();}
}

function buildDmHtml(msgs, myId, friendId){
  if(!msgs.length) return '<div style="text-align:center;color:var(--tx3);font-size:13px;padding:20px">Начни переписку 👋</div>';
  return msgs.map(m=>{
    const isOut = m.from_id===myId;
    return`<div class="msg-row ${isOut?'out':'in'}">
      <div class="msg-bubble ${isOut?'out':'in'}" onclick="dmMsgTap(event,'${esc(m.message?.slice(0,50)?.replace(/'/g,"\'"))||''}',${isOut})">
        ${esc(m.message||'')}
        <div class="msg-time">${(m.created_at||'').slice(11,16)}${isOut?(m.is_read?' ✓✓':' ✓'):''}</div>
      </div>
    </div>`;
  }).join('');
}

function dmMsgTap(e, text, isOut){
  showCtxSheet([
    {icon:'↩',label:'Ответить',fn:()=>{
      S.replyTo={text};
      const bar=document.getElementById('reply-bar-dm');
      const barText=document.getElementById('reply-bar-dm-text');
      if(bar)bar.style.display='flex';
      if(barText)barText.textContent='↩ '+text;
      document.getElementById('dm-inp')?.focus();
    }},
    ...(isOut?[{icon:'🗑',label:'Удалить',danger:true,fn:()=>toast('Удаление в разработке')}]:[]),
  ]);
}

async function dmSend(friendId){
  const inp=document.getElementById('dm-inp');const text=inp?.value?.trim();
  if(!text)return;inp.value='';S.replyTo=null;
  const bar=document.getElementById('reply-bar-dm');if(bar)bar.style.display='none';
  try{
    await api('/dm/send',{to_id:friendId,message:text});
    await refreshDmChat(friendId,'','');scrollChat('dmmsgs');
  }catch(e){toast('❌ '+e.message);}
}

async function refreshDmChat(friendId, nick, ava){
  if(S.page!=='chat'){clearInterval(dmInterval);dmInterval=null;return;}
  try{
    const msgs=await api('/dm/messages',{with_id:friendId});const myId=uid();
    const el=document.getElementById('dmmsgs');if(!el)return;
    const atBot=el.scrollHeight-el.scrollTop-el.offsetHeight<80;
    const prev=el.querySelectorAll('.msg-bubble').length;
    el.innerHTML=buildDmHtml(msgs,myId,friendId);
    if(msgs.length>prev)playSound();
    if(atBot)scrollChat('dmmsgs');
  }catch(e){}
}

function updateDmBadges(){
  const total=Object.values(dmUnread).reduce((a,b)=>a+b,0);
  const badge=document.getElementById('badge-msgs');
  if(badge){
    if(total>0){badge.textContent=total>9?'9+':total;badge.classList.add('on');}
    else if(!badge.textContent||badge.textContent==='0')badge.classList.remove('on');
  }
}

async function checkDmUnread(){
  if(!uid())return;
  try{
    const res=await api('/dm/unread_count');
    dmUnread=res;
    const total=Object.values(res).reduce((a,b)=>a+b,0);
    if(total>0){
      const badge=document.getElementById('badge-msgs');
      if(badge){badge.textContent=total>9?'9+':total;badge.classList.add('on');}
    }
  }catch(e){}
}
